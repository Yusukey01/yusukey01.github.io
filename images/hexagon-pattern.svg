<svg xmlns="http://www.w3.org/2000/svg" width="34.641" height="60" viewBox="0 0 34.641 60">
  <!-- Honeycomb tile: pointy-top hexagons, circumradius R = 20.
       Tile dimensions: W = R*sqrt(3) = 34.641, H = 3R = 60.
       Two hex rows per tile; row 2 wraps the left/right edges so
       background-repeat produces a seamless infinite honeycomb. -->
  <g fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1">
    <!-- Row 1: full hex centered at (W/2, R) = (17.32, 20) -->
    <polygon points="17.32,0 34.64,10 34.64,30 17.32,40 0,30 0,10"/>

    <!-- Row 2: hex centered at left edge (0, 2.5R) — wraps -->
    <polygon points="0,30 17.32,40 17.32,60 0,70 -17.32,60 -17.32,40"/>

    <!-- Row 2: hex centered at right edge (W, 2.5R) — wraps -->
    <polygon points="34.64,30 51.96,40 51.96,60 34.64,70 17.32,60 17.32,40"/>
  </g>
</svg>
