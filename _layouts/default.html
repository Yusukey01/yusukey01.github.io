---
uses_math: false
uses_python: false
---
<!DOCTYPE html>
<html lang="en" data-theme="dark">
{% include head.html %}
<body>
    {% include header.html %}
    
    {{ content }}
    
    {% include footer.html %}
    
    <!-- Site-wide scripts. Root-absolute paths: identical markup on every
         page (same policy as header/footer), with site.version cache busting. -->
    <script src="/js/main.js?v={{ site.version }}"></script>
    <script src="/js/search.js?v={{ site.version }}"></script>
    <script src="/js/theme-switcher.js?v={{ site.version }}"></script>
    <script src="/js/ref-preview.js?v={{ site.version }}"></script>
    <script src="/js/link-confirm.js?v={{ site.version }}"></script>

    {% if page.level == 'home' %}
    <script src="/js/updateLog.js?v={{ site.version }}"></script>
    {% endif %}

    <!-- Floating Knowledge Map button (site-wide; styles live in
         compass-map-styles.css, which head.html loads on every page) -->
    <a href="/map/compass.html" class="floating-compass-btn" aria-label="Open Knowledge Map" title="Open Knowledge Map">
        <i class="fas fa-compass"></i>
        <span class="floating-btn-pulse"></span>
    </a>

    <button id="go-to-top-btn" class="go-to-top-btn" title="Go to top">
        <i class="fas fa-arrow-up"></i>
    </button>
    <script>
        // Register the service worker.
        // NOTE: the worker must live at the SITE ROOT (/service-worker.js).
        // A worker served from /js/ has default scope /js/ and can never
        // control the site's pages (browsers cap scope at the script's
        // directory unless the server sends Service-Worker-Allowed, which
        // GitHub Pages does not).
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            // Clean up the old registration whose scope was /js/ (it never
            // controlled any page, but lingers in visitors' browsers).
            navigator.serviceWorker.getRegistrations().then(regs => {
              regs.forEach(reg => {
                if (reg.scope.endsWith('/js/')) reg.unregister();
              });
            });
            navigator.serviceWorker.register('/service-worker.js')
              .then(registration => {
                console.log('ServiceWorker registration successful with scope: ', registration.scope);
              })
              .catch(error => {
                console.log('ServiceWorker registration failed: ', error);
              });
          });
        }
      </script>
</body>
</html>
