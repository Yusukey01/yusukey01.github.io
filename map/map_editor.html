<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATH-CS COMPASS - Map Layout Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111827;
            color: #fff;
            min-height: 100vh;
        }
        .container { padding: 16px; max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 1.25rem; margin-bottom: 12px; }
        .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
        .controls label { display: flex; align-items: center; gap: 6px; font-size: 0.875rem; cursor: pointer; }
        .controls input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.75rem; margin-bottom: 12px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; }
        .main-content { display: flex; gap: 16px; }
        .map-container { 
            flex: 1; background: #030712; border-radius: 8px; 
            overflow: hidden; max-height: 65vh; min-height: 400px;
            height: calc(100vh - 120px);
            max-height: none;
            position: relative;
            overscroll-behavior: contain;
        }
        .zoom-controls-editor {
            position: absolute; top: 8px; right: 8px;
            display: flex; gap: 6px; z-index: 5;
        }
        .zoom-controls-editor button {
            width: 30px; height: 30px;
            background: rgba(31, 41, 55, 0.9);
            color: #fff; border: 1px solid #374151; border-radius: 6px;
            font-size: 0.9rem; cursor: pointer; line-height: 1;
        }
        .zoom-controls-editor button:hover { background: #374151; }
        .zoom-controls-editor button.fit { width: auto; padding: 0 8px; font-size: 0.7rem; }
        .map-container svg { 
            width: 100%;
            height: 100%;
            min-height: 600px;
        }
        .info-panel { width: 340px; flex-shrink: 0; }
        .info-box { background: #1f2937; padding: 12px; border-radius: 8px; font-size: 0.75rem; margin-bottom: 12px; }
        .info-box h3 { font-size: 0.875rem; margin-bottom: 8px; }
        .info-box p { margin-bottom: 4px; }
        .info-box .label { color: #9ca3af; }
        .info-box .available { color: #4ade80; margin-top: 8px; font-weight: 500; }
        .info-box .reserved { color: #facc15; margin-top: 8px; }
        .info-box .url-link { 
            color: #60a5fa; text-decoration: none; word-break: break-all; 
            display: block; margin-top: 4px; font-size: 0.7rem;
        }
        .info-box .url-link:hover { text-decoration: underline; }
        .stats { font-size: 0.75rem; color: #9ca3af; }
        .section-stats { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .section-stats .count-reserved { color: #6b7280; }
        svg text { user-select: none; pointer-events: none; }
        svg g { cursor: pointer; }
        svg g:hover path { filter: brightness(1.2); }
        @keyframes prereq-pulse {
            0%, 100% { stroke-opacity: 1; stroke-width: 2.5; }
            50% { stroke-opacity: 0.3; stroke-width: 1.5; }
        }
        svg g.prereq-glow path {
            animation: prereq-pulse 1.2s ease-in-out infinite;
        }
        .loading { text-align: center; padding: 40px; color: #9ca3af; }
        .error { text-align: center; padding: 40px; color: #ef4444; }
        .error code { display: block; margin-top: 12px; font-size: 0.8rem; color: #9ca3af; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        const SECTION_COLORS = {
            'HOME': '#888888',
            'RESEARCH': '#f0a500',
            'I': '#1565c0',
            'II': '#2e7d32',
            'III': "#00838f",
            'IV': '#6a1b9a',
            'V': '#ef6c00',
            'EMPTY': '#2a2a2a'
        };

        const SECTION_NAMES = {
            'HOME': 'Home',
            'RESEARCH': 'Research',
            'I': 'Linear Algebra to Algebraic Foundations',
            'II': 'Calculus to Optimization & Analysis',
            'III': 'Probability & Statistics',
            'IV': 'Discrete Mathematics & Algorithms',
            'V': 'Machine Learning'
        };

        // --- AUTO-LAYOUT UTILITIES ---
        // Define ideal radial angles for each section (SVG y-axis points DOWN)
        // Top is -π/2, Bottom is π/2, Right is 0, Left is ±π
        const SECTION_TARGET_ANGLES = {
            'I': -Math.PI * 0.75,  // Top-Left (-135 deg)
            'II': -Math.PI * 0.25, // Top-Right (-45 deg)
            'III': Math.PI * 0.15, // Right-ish (27 deg)
            'IV': Math.PI * 0.85,  // Left-ish (153 deg)
            'V': Math.PI * 0.5     // Bottom (90 deg)
        };

        // Hex grid distance (Manhattan distance on hex grid)
        const hexDistance = (q1, r1, q2, r2) => {
            return (Math.abs(q1 - q2) + Math.abs(q1 + r1 - q2 - r2) + Math.abs(r1 - r2)) / 2;
        };

        // Get 6 neighbors for a hex
        const getHexNeighbors = (q, r) => [
            {q: q+1, r: r}, {q: q-1, r: r}, {q: q, r: r+1},
            {q: q, r: r-1}, {q: q+1, r: r-1}, {q: q-1, r: r+1}
        ];

        // Convert hex to pixel just for angle calculations (assumes size 1)
        const getHexAngle = (q, r) => {
            const x = Math.sqrt(3) * (q + r / 2);
            const y = (3 / 2) * r;
            return Math.atan2(y, x);
        };
        
        // Shortest angular distance between two angles in radians
        const angleDifference = (a1, a2) => {
            let diff = Math.abs(a1 - a2) % (2 * Math.PI);
            return diff > Math.PI ? (2 * Math.PI) - diff : diff;
        };
        
        
        /**
         * Load curriculum data from JSON file - same logic as compass.html
         */
        async function loadCurriculumData() {
            // Try multiple paths to support different folder structures
            const paths = [
                '../data/curriculum.json',
                './data/curriculum.json',
                '/data/curriculum.json',
                'curriculum.json'
            ];
            
            let data = null;
            let lastError = null;
            
            for (const path of paths) {
                try {
                    const response = await fetch(path);
                    if (response.ok) {
                        data = await response.json();
                        console.log(`Loaded curriculum from: ${path}`);
                        break;
                    }
                } catch (e) {
                    lastError = e;
                }
            }
            
            if (!data) {
                throw new Error(`Could not load curriculum.json. Tried: ${paths.join(', ')}`);
            }
            
            return processCurriculumData(data);
        }

        // Pure transformation: curriculum.json object -> editor state pieces.
        // Shared by the server fetch and by local-file loading.
        function processCurriculumData(data) {
            const tiles = [];
            const foundGroups = {}; // To store dynamic topic group names
            const formatGroupName = (id) => id.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

            // Add home node
            if (data.homeNode) {
                tiles.push({
                    id: data.homeNode.id,
                    section: 'HOME',
                    title: data.homeNode.title,
                    url: data.homeNode.url,
                    q: data.homeNode.mapCoords.q,
                    r: data.homeNode.mapCoords.r
                });
            }

            // Add research node
            if (data.researchNode) {
                tiles.push({
                    id: data.researchNode.id,
                    section: 'RESEARCH',
                    title: data.researchNode.title,
                    url: data.researchNode.url,
                    q: data.researchNode.mapCoords.q,
                    r: data.researchNode.mapCoords.r,
                    isResearch: true
                });
            }
            
            // Add all parts from all sections
            Object.entries(data.sections).forEach(([sectionId, section]) => {
                section.parts.forEach(part => {
                    tiles.push({
                        id: part.id,
                        section: sectionId,
                        title: part.title,
                        url: section.baseUrl + part.url,
                        q: part.mapCoords.q,
                        r: part.mapCoords.r,
                        prereqs: part.prereqs || [],
                        keywords: part.keywords || [],
                        topicGroup: part.topicGroup || null
                    });
                    // Dynamically collect topic groups
                    if (part.topicGroup) {
                        foundGroups[part.topicGroup] = formatGroupName(part.topicGroup);
                    }
                });
                
                // Add reserved slots
                if (section.reservedSlots) {
                    section.reservedSlots.forEach((slot, index) => {
                        tiles.push({
                            id: `${sectionId}-reserved-${index}`,
                            section: sectionId,
                            title: 'Coming Soon',
                            url: null,
                            q: slot.q,
                            r: slot.r,
                            isReserved: true,
                            reservedIndex: index, // Track original index for export
                            topicGroup: null
                        });
                    });
                }
            });
            
            // Return rawData and dynamically generated group names as well
            return { tiles, rawData: data, topicGroupNames: foundGroups };
        }

        const buttonBaseStyle = {
            width: '100%',
            padding: '8px 12px',
            border: 'none',
            borderRadius: '4px',
            color: 'white',
            cursor: 'pointer',
            fontWeight: '500',
            textAlign: 'left',
            transition: 'all 0.2s',
        };

        const analysisButtonStyles = {
            fullChain: { ...buttonBaseStyle, backgroundColor: '#0e7490' }, // Teal
            keystones: { ...buttonBaseStyle, backgroundColor: '#be185d' }, // Pink/Magenta
            orphans: { ...buttonBaseStyle, backgroundColor: '#b45309' },   // Amber/Orange
            clear: { ...buttonBaseStyle, backgroundColor: '#4b5563' }      // Gray
        };

        function HexMapEditor() {
            const [tiles, setTiles] = useState([]);
            const [originalData, setOriginalData] = useState(null); // Holds the full JSON structure
            const [topicGroupNames, setTopicGroupNames] = useState({}); // Holds dynamic group names
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [selectedTile, setSelectedTile] = useState(null);
            const [showEmptySlots, setShowEmptySlots] = useState(true);
            const [showReserved, setShowReserved] = useState(true);
            const [highlightSections, setHighlightSections] = useState(new Set());
            const [draggingId, setDraggingId] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const [dragHex, setDragHex] = useState(null);

            const [selectedIds, setSelectedIds] = useState([]); // For multi-select
            const undoStack = React.useRef([]); // undo stack
            const [analysisMode, setAnalysisMode] = useState(null); // For visual analysis
            const [dragState, setDragState] = useState(null); // For dragging tiles

            const [addReservedTarget, setAddReservedTarget] = useState(null);
            const [selectionBox, setSelectionBox] = useState(null);
            const [showBridges, setShowBridges] = useState(false);
            const [showIslandHulls, setShowIslandHulls] = useState(false);

            // Zoom / pan: null = auto-fit to content; an object = user-set
            // camera that stays put while tiles move (no mid-drag refits).
            const [view, setView] = useState(null);
            const [panState, setPanState] = useState(null);
            // Pending rotate/move preview of the current selection:
            // { pivot, rot, mir, deltaHex } or null. Data is untouched while set.
            const [floatState, setFloatState] = useState(null);
            // Named layout snapshots persisted in localStorage.
            const [snapshots, setSnapshots] = useState(() => {
                try { return JSON.parse(localStorage.getItem('mapEditorSnapshots') || '{}'); }
                catch (e) { return {}; }
            });
            const [snapName, setSnapName] = useState('');
            const svgRef = React.useRef(null);
            const fitBoundsRef = React.useRef(null);
            const fileInputRef = React.useRef(null);
            // 'server' or the local file's name once one has been loaded
            const [dataSource, setDataSource] = useState('server');

            const hexSize = 28;

            // --- Undo Logic ---
            // Full-array snapshots: coordinate-only history could not undo
            // adding or deleting reserved tiles (their ids no longer matched).
            const saveHistory = useCallback((currentTilesBeforeChange) => {
                undoStack.current.push(currentTilesBeforeChange.map(t => ({ ...t })));
                if (undoStack.current.length > 50) undoStack.current.shift();
            }, []);

            const undo = useCallback(() => {
                const snapshot = undoStack.current.pop();
                if (!snapshot) return;
                setTiles(snapshot);
                setFloatState(null);
                // Selections may reference tiles that no longer exist (or
                // resurrect ones that do again) - clear to stay consistent.
                setSelectedTile(null);
                setSelectedIds([]);
            }, []);

            // ---  Multi-Select Logic ---
           const handleTileClick = (e, tile) => {
                setFloatState(null); // a click outside the float gesture cancels the preview
                if (tile.section === 'EMPTY') {
                    setAddReservedTarget({ q: tile.q, r: tile.r });
                    setSelectedTile(null);
                    setSelectedIds([]);
                    return;
                }
                setAddReservedTarget(null);
                if (e.shiftKey || e.ctrlKey || e.metaKey) {
                    setSelectedIds(prev => 
                        prev.includes(tile.id) ? prev.filter(id => id !== tile.id) : [...prev, tile.id]
                    );
                    setSelectedTile(null);
                } else {
                    setSelectedTile(tile);
                    setSelectedIds([tile.id]);
                }
            };

            // --- Add / Delete Reserved Tiles ---
            const addReservedTile = (section, q, r) => {
                const existingCount = tiles.filter(t => t.isReserved && t.section === section).length;
                const newTile = {
                    id: `${section}-reserved-${Date.now()}`,
                    section,
                    title: 'Coming Soon',
                    url: null,
                    q, r,
                    isReserved: true,
                    reservedIndex: existingCount,
                    topicGroup: null
                };
                saveHistory(tiles);
                const newTiles = [...tiles, newTile];
                setTiles(newTiles);
                setAddReservedTarget(null);
                setSelectedTile(newTile);
                setSelectedIds([newTile.id]);
            };

            const deleteSelectedReserved = useCallback(() => {
                const toDelete = new Set(selectedIds.filter(id => tiles.find(t => t.id === id)?.isReserved));
                if (toDelete.size === 0) return;
                saveHistory(tiles);
                const newTiles = tiles.filter(t => !toDelete.has(t.id));
                setTiles(newTiles);
                setSelectedTile(null);
                setSelectedIds([]);
            }, [selectedIds, tiles, saveHistory]);
            
            // --- Analysis Logic ---
            const getAnalysisHighlights = (tile) => {
                if (!tile || !analysisMode) return { upstream: [], downstream: [] };
                
                let upstream = new Set();
                let downstream = new Set();
                
                // Upstream (Prerequisites)
                if (analysisMode === 'prereqs' || analysisMode === 'full_chain') {
                    const toProcess = [...(tile.prereqs || [])];
                    while (toProcess.length > 0) {
                        const id = toProcess.pop();
                        if (!upstream.has(id)) {
                            upstream.add(id);
                            const prereqTile = tiles.find(t => t.id === id);
                            if (prereqTile && prereqTile.prereqs) {
                                toProcess.push(...prereqTile.prereqs);
                            }
                        }
                    }
                }
                
                // Downstream (Dependents)
                if (analysisMode === 'dependents' || analysisMode === 'full_chain') {
                    tiles.forEach(t => {
                        if (t.prereqs && t.prereqs.includes(tile.id)) {
                            downstream.add(t.id);
                        }
                    });
                }

                return { upstream: Array.from(upstream), downstream: Array.from(downstream) };
            };

           const analysisHighlights = useMemo(() => {
                if (!selectedTile || !analysisMode) return { upstream: new Set(), downstream: new Set() };
                const upstream = new Set();
                const queue = [...(selectedTile.prereqs || [])];
                while(queue.length > 0) {
                    const id = queue.pop();
                    if (!upstream.has(id)) {
                        upstream.add(id);
                        const t = tiles.find(tile => tile.id === id);
                        if (t?.prereqs) queue.push(...t.prereqs);
                    }
                }
                const downstream = new Set(tiles.filter(t => t.prereqs?.includes(selectedTile.id)).map(t => t.id));
                return { upstream, downstream };
            }, [selectedTile, analysisMode, tiles]);

            const keystoneTiles = useMemo(() => {
                if (analysisMode !== 'keystones') return new Set();
                const counts = tiles.reduce((acc, t) => {
                    (t.prereqs || []).forEach(pId => { acc[pId] = (acc[pId] || 0) + 1; });
                    return acc;
                }, {});
                const max = Math.max(0, ...Object.values(counts));
                return new Set(Object.keys(counts).filter(id => counts[id] > max * 0.6));
            }, [analysisMode, tiles]);

            const orphanTiles = useMemo(() => {
                if (analysisMode !== 'orphans') return new Set();
                const allPrereqs = new Set(tiles.flatMap(t => t.prereqs || []));
                return new Set(tiles.filter(t => !allPrereqs.has(t.id) && t.section !== 'HOME' && t.section !== 'RESEARCH').map(t => t.id));
            }, [analysisMode, tiles]);
            

            // --- ISLAND COMPACTION CORE LOGIC ---
            // Philosophy: islands (topicGroup clusters) are the layout unit. We do NOT
            // globally reshuffle the map (that destroys hand-tuned territory and is
            // visually unstable). Instead each island is compacted IN PLACE into a tight
            // hub-centered blob, using only cells it already occupies or empty cells —
            // it can never overwrite another island. Island PLACEMENT (where a blob sits)
            // stays a manual, aesthetic decision via drag.

            // Compact a single island's member tiles into a tight blob near their current
            // centroid. `forbidden` = set of "q,r" cells owned by OTHER tiles (off-limits).
            const compactIslandTiles = (members, forbidden) => {
                if (members.length <= 1) return new Map(members.map(m => [m.id, { q: m.q, r: m.r }]));

                const memById = new Map(members.map(m => [m.id, m]));
                const inIsland = id => memById.has(id);
                const free = (q, r) => !forbidden.has(`${q},${r}`);

                // Current centroid (rounded to a hex via cube rounding through pixelToHex-free approx)
                const cq = Math.round(members.reduce((s, m) => s + m.q, 0) / members.length);
                const cr = Math.round(members.reduce((s, m) => s + m.r, 0) / members.length);

                // Hub = most-referenced tile within the island (highest in-island in-degree),
                // tie-broken by fewest own in-island prereqs (closest to a root).
                const indeg = {};
                members.forEach(m => (m.prereqs || []).forEach(p => { if (inIsland(p)) indeg[p] = (indeg[p] || 0) + 1; }));
                const ownPre = m => (m.prereqs || []).filter(inIsland).length;
                const hub = members.reduce((best, m) => {
                    const a = [indeg[m.id] || 0, -ownPre(m)];
                    const b = [indeg[best.id] || 0, -ownPre(best)];
                    return (a[0] > b[0] || (a[0] === b[0] && a[1] > b[1])) ? m : best;
                }, members[0]);

                // BFS order over the island's undirected prereq graph, starting from hub.
                const adj = {};
                members.forEach(m => { adj[m.id] = adj[m.id] || new Set(); });
                members.forEach(m => (m.prereqs || []).forEach(p => {
                    if (inIsland(p)) { adj[m.id].add(p); adj[p].add(m.id); }
                }));
                const order = [hub.id];
                const seen = new Set([hub.id]);
                const queue = [hub.id];
                while (queue.length) {
                    const c = queue.shift();
                    [...adj[c]].sort().forEach(nb => { if (!seen.has(nb)) { seen.add(nb); queue.push(nb); order.push(nb); } });
                }
                members.forEach(m => { if (!seen.has(m.id)) order.push(m.id); });

                // Place hub at centroid if free, else nearest free cell.
                const pos = new Map();
                const occ = new Set();
                let hubCell = null;
                if (free(cq, cr)) hubCell = { q: cq, r: cr };
                else {
                    for (let rad = 1; rad <= 10 && !hubCell; rad++) {
                        const ring = [];
                        for (let q = cq - rad; q <= cq + rad; q++)
                            for (let r = cr - rad; r <= cr + rad; r++)
                                if (hexDistance(cq, cr, q, r) === rad && free(q, r)) ring.push({ q, r });
                        if (ring.length) hubCell = ring.reduce((a, b) =>
                            hexDistance(cq, cr, a.q, a.r) <= hexDistance(cq, cr, b.q, b.r) ? a : b);
                    }
                }
                if (!hubCell) hubCell = { q: cq, r: cr }; // last resort
                pos.set(hub.id, hubCell);
                occ.add(`${hubCell.q},${hubCell.r}`);

                // Greedily place remaining members: hug the blob, fill concavities,
                // sit adjacent to in-island prereqs.
                for (const id of order) {
                    if (id === hub.id) continue;
                    const tile = memById.get(id);
                    const cands = new Set();
                    occ.forEach(key => {
                        const [q, r] = key.split(',').map(Number);
                        getHexNeighbors(q, r).forEach(n => {
                            const nk = `${n.q},${n.r}`;
                            if (!occ.has(nk) && free(n.q, n.r)) cands.add(nk);
                        });
                    });
                    let best = null, bestScore = -Infinity;
                    cands.forEach(nk => {
                        const [q, r] = nk.split(',').map(Number);
                        let sc = -hexDistance(hubCell.q, hubCell.r, q, r) * 4;
                        // reward cells that touch many already-placed island cells (compactness)
                        getHexNeighbors(q, r).forEach(n => { if (occ.has(`${n.q},${n.r}`)) sc += 3; });
                        (tile.prereqs || []).forEach(p => {
                            if (pos.has(p)) {
                                const pc = pos.get(p);
                                const dd = hexDistance(q, r, pc.q, pc.r);
                                sc += dd === 1 ? 25 : -dd * 4;
                            }
                        });
                        if (sc > bestScore) { bestScore = sc; best = { q, r }; }
                    });
                    if (!best) { // no free adjacent cell anywhere — leave in place
                        best = { q: tile.q, r: tile.r };
                    }
                    pos.set(id, best);
                    occ.add(`${best.q},${best.r}`);
                }
                return pos;
            };

            // Build the list of islands (topicGroup clusters) from the current tiles.
            // Reserved tiles and HOME/RESEARCH are excluded; ungrouped real tiles each
            // form their own singleton island so they are never moved by accident.
            const buildIslands = (tileList) => {
                const groups = new Map(); // key -> [tiles]
                tileList.forEach(t => {
                    if (t.section === 'HOME' || t.section === 'RESEARCH' || t.isReserved) return;
                    const key = t.topicGroup ? `${t.section}::${t.topicGroup}` : `__solo::${t.id}`;
                    if (!groups.has(key)) groups.set(key, []);
                    groups.get(key).push(t);
                });
                return groups;
            };

            // Compact ALL islands in place (each sees others' current cells as forbidden).
            // Larger islands first so they claim their tight blob before small ones fill gaps.
            const performAutoLayout = () => {
                setLoading(true);
                const groups = buildIslands(tiles);
                const orderedKeys = [...groups.keys()].sort((a, b) => groups.get(b).length - groups.get(a).length);

                // working coordinate map id -> {q,r}, seeded from current positions
                const coordOf = new Map(tiles.map(t => [t.id, { q: t.q, r: t.r }]));
                const cellOwner = new Map(); // "q,r" -> id (live occupancy across all tiles)
                tiles.forEach(t => cellOwner.set(`${t.q},${t.r}`, t.id));

                orderedKeys.forEach(key => {
                    const members = groups.get(key).map(m => ({ ...m, q: coordOf.get(m.id).q, r: coordOf.get(m.id).r }));
                    const memberIds = new Set(members.map(m => m.id));
                    // forbidden = every occupied cell NOT owned by this island
                    const forbidden = new Set();
                    cellOwner.forEach((id, cell) => { if (!memberIds.has(id)) forbidden.add(cell); });
                    const newPos = compactIslandTiles(members, forbidden);
                    // free this island's old cells, then commit new ones
                    members.forEach(m => cellOwner.delete(`${coordOf.get(m.id).q},${coordOf.get(m.id).r}`));
                    newPos.forEach((c, id) => { coordOf.set(id, c); cellOwner.set(`${c.q},${c.r}`, id); });
                });

                saveHistory(tiles);
                setTiles(tiles.map(t => {
                    const c = coordOf.get(t.id);
                    return c ? { ...t, q: c.q, r: c.r } : t;
                }));
                setTimeout(() => setLoading(false), 300);
            };

            // Compact only ONE island (the one containing the given tile), in place.
            const compactSingleIsland = (anchorTile) => {
                if (!anchorTile || anchorTile.isReserved || anchorTile.section === 'HOME' || anchorTile.section === 'RESEARCH') return;
                const key = anchorTile.topicGroup ? `${anchorTile.section}::${anchorTile.topicGroup}` : null;
                if (!key) return; // ungrouped: nothing to compact
                const members = tiles.filter(t => t.topicGroup === anchorTile.topicGroup && t.section === anchorTile.section && !t.isReserved);
                if (members.length <= 1) return;
                const memberIds = new Set(members.map(m => m.id));
                const forbidden = new Set();
                tiles.forEach(t => { if (!memberIds.has(t.id)) forbidden.add(`${t.q},${t.r}`); });
                const newPos = compactIslandTiles(members, forbidden);
                saveHistory(tiles);
                setTiles(tiles.map(t => {
                    const c = newPos.get(t.id);
                    return c ? { ...t, q: c.q, r: c.r } : t;
                }));
            };

            // --- SELECTION ROTATION with float preview ---
            // Rotation always succeeds as an OPERATION: if the rotated shape
            // collides with outside tiles, nothing is committed - instead the
            // selection enters a floating preview (rendered at the rotated
            // position, colliding cells outlined red) that the user can keep
            // rotating and drag to a free spot. The transform commits
            // automatically the moment it is collision-free. Esc cancels the
            // preview (the underlying data never moved).

            // Rounded cube-coordinate centroid of a set of tiles.
            const cubePivotOf = (sel) => {
                let cx = 0, cy = 0, cz = 0;
                sel.forEach(t => { const x = t.q, z = t.r, y = -x - z; cx += x; cy += y; cz += z; });
                cx /= sel.length; cy /= sel.length; cz /= sel.length;
                let rx = Math.round(cx), ry = Math.round(cy), rz = Math.round(cz);
                const dxx = Math.abs(rx - cx), dyy = Math.abs(ry - cy), dzz = Math.abs(rz - cz);
                if (dxx > dyy && dxx > dzz) rx = -ry - rz;
                else if (dyy > dzz) ry = -rx - rz;
                else rz = -rx - ry;
                return { rx, ry, rz };
            };

            // Orientation R^rot ∘ M^mir around the pivot, then translate.
            // The mirror swaps cube x/y, which in this pixel mapping
            // (x ∝ q + r/2) is a horizontal flip through the pivot.
            const xformN = (t, piv, rot, mir, delta) => {
                let x = t.q - piv.rx, z = t.r - piv.rz, y = (-t.q - t.r) - piv.ry;
                if (mir & 1) { const tmp = x; x = y; y = tmp; }
                const steps = ((rot % 6) + 6) % 6;
                for (let k = 0; k < steps; k++) {
                    const nx = -z, ny = -x, nz = -y;
                    x = nx; y = ny; z = nz;
                }
                return { q: x + piv.rx + (delta ? delta.q : 0), r: z + piv.rz + (delta ? delta.r : 0) };
            };

            // Try to commit the transform; if blocked, keep/enter float preview.
            const applyTransformOrFloat = useCallback((piv, rot, mir, delta) => {
                const idSet = new Set(selectedIds);
                const sel = tiles.filter(t => idSet.has(t.id));
                if (sel.length === 0) return false;
                const targets = new Map(sel.map(t => [t.id, xformN(t, piv, rot, mir, delta)]));
                const cells = new Set(Array.from(targets.values(), c => `${c.q},${c.r}`));
                const collision = tiles.some(t => !idSet.has(t.id) && cells.has(`${t.q},${t.r}`));
                if (!collision) {
                    saveHistory(tiles);
                    setTiles(tiles.map(t => targets.has(t.id) ? { ...t, ...targets.get(t.id) } : t));
                    setFloatState(null);
                    return true;
                }
                setFloatState({ pivot: piv, rot, mir, deltaHex: delta });
                return false;
            }, [selectedIds, tiles, saveHistory]);

            const rotateSelection = useCallback((dir) => {
                if (selectedIds.length < 2) return;
                const idSet = new Set(selectedIds);
                const sel = tiles.filter(t => idSet.has(t.id));
                if (sel.length < 2) return;
                const piv = floatState ? floatState.pivot : cubePivotOf(sel);
                const rot = (floatState ? floatState.rot : 0) + (dir === 'cw' ? 1 : -1);
                const mir = floatState ? (floatState.mir || 0) : 0;
                const delta = floatState ? floatState.deltaHex : { q: 0, r: 0 };
                applyTransformOrFloat(piv, rot, mir, delta);
            }, [selectedIds, tiles, floatState, applyTransformOrFloat]);

            // Horizontal flip through the selection's pivot. Composing an
            // outer mirror with R^rot ∘ M^mir gives R^(-rot) ∘ M^(mir+1);
            // the translation is unchanged (the shape flips in place).
            const flipSelection = useCallback(() => {
                if (selectedIds.length < 2) return;
                const idSet = new Set(selectedIds);
                const sel = tiles.filter(t => idSet.has(t.id));
                if (sel.length < 2) return;
                const piv = floatState ? floatState.pivot : cubePivotOf(sel);
                const rot = -(floatState ? floatState.rot : 0);
                const mir = (floatState ? (floatState.mir || 0) : 0) ^ 1;
                const delta = floatState ? floatState.deltaHex : { q: 0, r: 0 };
                applyTransformOrFloat(piv, rot, mir, delta);
            }, [selectedIds, tiles, floatState, applyTransformOrFloat]);

            // Nudge the selection by one hex (arrow keys). Works for any
            // selection size and folds into a floating preview if present.
            const nudgeSelection = useCallback((d) => {
                if (selectedIds.length === 0) return false;
                const piv = floatState ? floatState.pivot : { rx: 0, ry: 0, rz: 0 };
                const rot = floatState ? floatState.rot : 0;
                const mir = floatState ? (floatState.mir || 0) : 0;
                const delta = floatState
                    ? { q: floatState.deltaHex.q + d.q, r: floatState.deltaHex.r + d.r }
                    : d;
                applyTransformOrFloat(piv, rot, mir, delta);
                return true;
            }, [selectedIds, floatState, applyTransformOrFloat]);

            const persistSnapshots = (next) => {
                setSnapshots(next);
                try { localStorage.setItem('mapEditorSnapshots', JSON.stringify(next)); } catch (e) {}
            };
            const saveSnapshot = () => {
                const name = snapName.trim() || 'layout-' + new Date().toISOString().slice(0, 16).replace('T', ' ');
                const coords = {};
                tiles.forEach(t => { coords[t.id] = [t.q, t.r]; });
                persistSnapshots({ ...snapshots, [name]: { savedAt: Date.now(), coords } });
                setSnapName('');
            };
            const loadSnapshot = (name) => {
                const snap = snapshots[name];
                if (!snap) return;
                saveHistory(tiles);
                setFloatState(null);
                setSelectedTile(null);
                setSelectedIds([]);
                setTiles(tiles.map(t => snap.coords[t.id]
                    ? { ...t, q: snap.coords[t.id][0], r: snap.coords[t.id][1] }
                    : t));
            };
            const deleteSnapshot = (name) => {
                const next = { ...snapshots };
                delete next[name];
                persistSnapshots(next);
            };

            // Select every tile of a section (including its reserved slots)
            // so the whole territory can be dragged as one unit. The move
            // itself reuses the existing multi-drag with collision checking.
            const selectSection = (key) => {
                const ids = tiles.filter(t => t.section === key).map(t => t.id);
                if (ids.length === 0) return;
                setFloatState(null);
                setSelectedIds(ids);
                setSelectedTile(null);
                setAnalysisMode(null);
            };

            // Select all tiles in the same island as the given tile.
            const selectIsland = (anchorTile) => {
                if (!anchorTile || !anchorTile.topicGroup) {
                    if (anchorTile) { setSelectedIds([anchorTile.id]); setSelectedTile(anchorTile); }
                    return;
                }
                const members = tiles.filter(t => t.topicGroup === anchorTile.topicGroup && t.section === anchorTile.section && !t.isReserved);
                setSelectedIds(members.map(m => m.id));
                setSelectedTile(null);
            };
            

            /**
             * Custom JSON serializer for curriculum.json.
             *   - Array of all-strings  -> grouped 5 per line (e.g. "keywords")
             *   - Array of shallow all-primitive objects -> one object per line
             *     (e.g. tile "sections": {id, name})
             *   - Everything else -> standard 2-space pretty printing.
             */
            const formatCurriculum = (data) => {
                const IND = '  ';
                const KEYWORDS_PER_LINE = 5;
                const isPrimitive = v => v === null || typeof v !== 'object';
                const isShallowObject = v =>
                    v && typeof v === 'object' && !Array.isArray(v) &&
                    Object.values(v).every(isPrimitive);

                const fmt = (value, depth, key) => {
                    const pad = IND.repeat(depth);
                    const padIn = IND.repeat(depth + 1);

                    // mapCoords: always inline as { "q": .., "r": .. }
                    if (key === 'mapCoords' && isShallowObject(value)) {
                        const inner = Object.entries(value)
                            .map(([k, v]) => JSON.stringify(k) + ': ' + JSON.stringify(v))
                            .join(', ');
                        return '{ ' + inner + ' }';
                    }

                    if (Array.isArray(value)) {
                        if (value.length === 0) return '[]';
                        if (value.every(v => typeof v === 'string')) {
                            const lines = [];
                            for (let i = 0; i < value.length; i += KEYWORDS_PER_LINE) {
                                const chunk = value.slice(i, i + KEYWORDS_PER_LINE)
                                    .map(s => JSON.stringify(s));
                                lines.push(padIn + chunk.join(', '));
                            }
                            return '[\n' + lines.join(',\n') + '\n' + pad + ']';
                        }
                        if (value.every(isShallowObject)) {
                            const lines = value.map(obj => {
                                const inner = Object.entries(obj)
                                    .map(([k, v]) => JSON.stringify(k) + ': ' + JSON.stringify(v))
                                    .join(', ');
                                return padIn + '{ ' + inner + ' }';
                            });
                            return '[\n' + lines.join(',\n') + '\n' + pad + ']';
                        }
                        const items = value.map(v => padIn + fmt(v, depth + 1));
                        return '[\n' + items.join(',\n') + '\n' + pad + ']';
                    }

                    if (value && typeof value === 'object') {
                        const keys = Object.keys(value);
                        if (keys.length === 0) return '{}';
                        const items = keys.map(k =>
                            padIn + JSON.stringify(k) + ': ' + fmt(value[k], depth + 1, k));
                        return '{\n' + items.join(',\n') + '\n' + pad + '}';
                    }

                    return JSON.stringify(value);
                };

                return fmt(data, 0);
            };

            /**
             * Function to export current tile layout to a JSON file
             */
            const exportToJson = () => {
                if (!originalData) return;

                const exportData = JSON.parse(JSON.stringify(originalData));
                if (exportData.meta) {
                    exportData.meta.lastUpdated = new Date().toISOString().slice(0, 10);
                }

                // Reset all reservedSlots — will rebuild from current tiles
                Object.keys(exportData.sections).forEach(key => {
                    exportData.sections[key].reservedSlots = [];
                });

                tiles.forEach(tile => {
                    if (tile.section === 'HOME') {
                        exportData.homeNode.mapCoords = { q: tile.q, r: tile.r };
                    } else if (tile.section === 'RESEARCH') {
                        exportData.researchNode.mapCoords = { q: tile.q, r: tile.r };
                    } else if (tile.isReserved) {
                        const section = exportData.sections[tile.section];
                        if (section) {
                            section.reservedSlots.push({ q: tile.q, r: tile.r });
                        }
                    } else {
                        const section = exportData.sections[tile.section];
                        if (section && section.parts) {
                            const part = section.parts.find(p => p.id === tile.id);
                            if (part) {
                                part.mapCoords = { q: tile.q, r: tile.r };
                                part.topicGroup = tile.topicGroup || null;
                                part.prereqs = tile.prereqs || [];
                            }
                        }
                    }
                });

                const blob = new Blob([formatCurriculum(exportData)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'curriculum.json';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            // Load a local curriculum.json (drag & drop or file picker).
            // Replaces the whole editing session: fresh tiles, cleared
            // selection/float/undo. Snapshots survive (they are keyed by
            // tile id and live in localStorage).
            const loadFromLocalFile = useCallback((file) => {
                if (!file || !file.name.toLowerCase().endsWith('.json')) {
                    alert('Please drop a .json file.');
                    return;
                }
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const data = JSON.parse(reader.result);
                        if (!data.sections) throw new Error('missing "sections" - is this a curriculum.json?');
                        const { tiles, rawData, topicGroupNames } = processCurriculumData(data);
                        setTiles(tiles);
                        setOriginalData(rawData);
                        setTopicGroupNames(topicGroupNames);
                        setSelectedTile(null);
                        setSelectedIds([]);
                        setFloatState(null);
                        setAnalysisMode(null);
                        undoStack.current = [];
                        setDataSource(file.name);
                        setError(null);
                        setLoading(false);
                    } catch (e) {
                        alert('Failed to load file: ' + e.message);
                    }
                };
                reader.readAsText(file);
            }, []);

            // Discard whatever is loaded and re-fetch the server copy.
            const reloadFromServer = useCallback(() => {
                setLoading(true);
                loadCurriculumData()
                    .then(({ tiles, rawData, topicGroupNames }) => {
                        setTiles(tiles);
                        setOriginalData(rawData);
                        setTopicGroupNames(topicGroupNames);
                        setSelectedTile(null);
                        setSelectedIds([]);
                        setFloatState(null);
                        setAnalysisMode(null);
                        undoStack.current = [];
                        setDataSource('server');
                        setError(null);
                        setLoading(false);
                    })
                    .catch(err => {
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            // Whole-window drag & drop
            useEffect(() => {
                const onDragOver = (e) => { e.preventDefault(); };
                const onDrop = (e) => {
                    e.preventDefault();
                    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
                    if (f) loadFromLocalFile(f);
                };
                window.addEventListener('dragover', onDragOver);
                window.addEventListener('drop', onDrop);
                return () => {
                    window.removeEventListener('dragover', onDragOver);
                    window.removeEventListener('drop', onDrop);
                };
            }, [loadFromLocalFile]);

            // Load data (once only)
            useEffect(() => {
                loadCurriculumData()
                    .then(({ tiles, rawData, topicGroupNames }) => {
                        setTiles(tiles);
                        setOriginalData(rawData);
                        setTopicGroupNames(topicGroupNames);
                        setLoading(false);

                        undoStack.current = [];
                    })
                    .catch(err => {
                        setError(err.message);
                        setLoading(false);
                    });
            }, []); // Empty — runs once

            // Keyboard shortcuts (separate effect)
           useEffect(() => {
                const handleKeyDown = (e) => {
                    const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
                    const isCtrl = isMac ? e.metaKey : e.ctrlKey;

                    if (isCtrl && e.key === 'z') {
                        e.preventDefault();
                        undo();
                    }
                    if (e.key === 'Delete' || e.key === 'Backspace') {
                        if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT' || document.activeElement.tagName === 'TEXTAREA') return;
                        e.preventDefault();
                        deleteSelectedReserved();
                    }
                    if (e.key === 'Escape') {
                        setAddReservedTarget(null);
                        setSelectedTile(null);
                        setSelectedIds([]);
                        setAnalysisMode(null);
                        setFloatState(null);
                    }
                    const typing = ['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement.tagName);
                    if ((e.key === 'r' || e.key === 'R') && !typing) {
                        e.preventDefault();
                        rotateSelection(e.shiftKey ? 'ccw' : 'cw');
                    }
                    if ((e.key === 'f' || e.key === 'F') && !typing) {
                        e.preventDefault();
                        flipSelection();
                    }
                    const arrowDir = { ArrowLeft: { q: -1, r: 0 }, ArrowRight: { q: 1, r: 0 },
                                       ArrowUp: { q: 0, r: -1 }, ArrowDown: { q: 0, r: 1 } }[e.key];
                    if (arrowDir && !typing) {
                        if (nudgeSelection(arrowDir)) e.preventDefault();
                    }
                };
                
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [undo, deleteSelectedReserved, rotateSelection, flipSelection, nudgeSelection]);
            
            const activeTiles = useMemo(() => {
                return tiles.filter(t => showReserved || !t.isReserved);
            }, [tiles, showReserved]);
            
            const occupiedMap = useMemo(() => {
                const map = new Map();
                activeTiles.forEach(tile => map.set(`${tile.q},${tile.r}`, tile));
                return map;
            }, [activeTiles]);
            
            const occupiedExclSelection = useMemo(() => {
                const idSet = new Set(selectedIds);
                const cells = new Set();
                tiles.forEach(t => { if (!idSet.has(t.id)) cells.add(`${t.q},${t.r}`); });
                return cells;
            }, [tiles, selectedIds]);

            // Layout quality: total hex length of all prerequisite edges and
            // of cross-cluster edges (different section or topicGroup), plus
            // the longest cross-cluster edges for targeted improvement.
            const layoutMetrics = useMemo(() => {
                const byId = new Map(tiles.map(t => [t.id, t]));
                const hexDist = (a, b) => {
                    const dq = a.q - b.q, dr = a.r - b.r;
                    return (Math.abs(dq) + Math.abs(dr) + Math.abs(dq + dr)) / 2;
                };
                let total = 0, cross = 0, crossCount = 0;
                const edges = [];
                tiles.forEach(t => (t.prereqs || []).forEach(pid => {
                    const p = byId.get(pid);
                    if (!p) return;
                    const d = hexDist(t, p);
                    total += d;
                    if (p.section !== t.section || p.topicGroup !== t.topicGroup) {
                        cross += d; crossCount++;
                        edges.push({ a: p, b: t, d });
                    }
                }));
                edges.sort((x, y) => y.d - x.d);
                return { total, cross, crossCount, top: edges.slice(0, 5) };
            }, [tiles]);

            const emptySlots = useMemo(() => {
                const slots = [];
                const checked = new Set();
                const neighbors = [[1, 0], [-1, 0], [0, 1], [0, -1], [1, -1], [-1, 1]];
                
                activeTiles.forEach(tile => {
                    neighbors.forEach(([dq, dr]) => {
                        const nq = tile.q + dq, nr = tile.r + dr;
                        const key = `${nq},${nr}`;
                        if (!occupiedMap.has(key) && !checked.has(key)) {
                            checked.add(key);
                            const borderingSection = new Set();
                            neighbors.forEach(([ddq, ddr]) => {
                                const neighbor = occupiedMap.get(`${nq + ddq},${nr + ddr}`);
                                if (neighbor && !neighbor.isReserved) borderingSection.add(neighbor.section);
                            });
                            slots.push({ q: nq, r: nr, section: 'EMPTY', borderingSection: Array.from(borderingSection) });
                        }
                    });
                });
                return slots;
            }, [occupiedMap, activeTiles]);
            
            const hexToPixel = (q, r) => ({
                x: hexSize * Math.sqrt(3) * (q + r / 2),
                y: hexSize * (3 / 2) * r
            });

            // Cross-cluster dependency bridges, in two practical modes.
            const bridges = useMemo(() => {
                if (!showBridges) return { mode: 'off', edges: [], bundles: [] };
                const active = tiles.filter(t => !t.isReserved);
                const byId = new Map(active.map(t => [t.id, t]));
                const hexDist = (a, b) => {
                    const dq = a.q - b.q, dr = a.r - b.r;
                    return (Math.abs(dq) + Math.abs(dr) + Math.abs(dq + dr)) / 2;
                };
                const crossEdges = [];
                active.forEach(t => (t.prereqs || []).forEach(pid => {
                    const p = byId.get(pid);
                    if (!p) return;
                    if (p.section === t.section && p.topicGroup === t.topicGroup) return;
                    crossEdges.push({ p, t, d: hexDist(p, t) });
                }));

                const selSet = new Set(selectedIds);
                if (selectedTile) selSet.add(selectedTile.id);
                if (selSet.size > 0) {
                    const edges = crossEdges
                        .filter(e => selSet.has(e.p.id) || selSet.has(e.t.id))
                        .map(e => {
                            const a = hexToPixel(e.p.q, e.p.r);
                            const b = hexToPixel(e.t.q, e.t.r);
                            const far = selSet.has(e.t.id) ? e.p : e.t;
                            const fpx = hexToPixel(far.q, far.r);
                            return { x1: a.x, y1: a.y, x2: b.x, y2: b.y,
                                     fx: fpx.x, fy: fpx.y, d: e.d,
                                     color: SECTION_COLORS[far.section] || '#888' };
                        });
                    return { mode: 'selection', edges, bundles: [] };
                }

                // No selection: draw nothing. A whole-map view was tried
                // twice (raw edges, then island bundles) and both were noise;
                // the macro picture lives in Layout Metrics instead.
                return { mode: 'off', edges: [], bundles: [] };
            }, [showBridges, tiles, selectedIds, selectedTile]);

            const pixelToHex = (x, y) => {
                const q = (Math.sqrt(3)/3 * x - 1/3 * y) / hexSize;
                const r = (2/3 * y) / hexSize;

                let x1 = q;
                let z1 = r;
                let y1 = -x1 - z1;

                let rx = Math.round(x1);
                let ry = Math.round(y1);
                let rz = Math.round(z1);

                const x_diff = Math.abs(rx - x1);
                const y_diff = Math.abs(ry - y1);
                const z_diff = Math.abs(rz - z1);

                if (x_diff > y_diff && x_diff > z_diff) {
                    rx = -ry - rz;
                } else if (y_diff > z_diff) {
                    ry = -rx - rz;
                } else {
                    rz = -rx - ry;
                }

                return { q: rx, r: rz };
            };

            
            const viewBox = useMemo(() => {
                const allTiles = [...activeTiles, ...emptySlots];
                if (allTiles.length === 0) return { x: -100, y: -100, width: 200, height: 200 };
                
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                allTiles.forEach(tile => {
                    const { x, y } = hexToPixel(tile.q, tile.r);
                    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
                });
                const padding = hexSize * 2;
                return { x: minX - padding, y: minY - padding, width: maxX - minX + padding * 2, height: maxY - minY + padding * 2 };
            }, [emptySlots, activeTiles]);

            // Effective camera: user view if set, else auto-fit bounds.
            fitBoundsRef.current = viewBox;
            const vb = view || viewBox;

            const zoomBy = (f) => setView(v0 => {
                const fit = fitBoundsRef.current;
                const v = v0 || fit;
                const cx = v.x + v.width / 2, cy = v.y + v.height / 2;
                const w = Math.min(Math.max(v.width * f, 120), fit.width * 3);
                const h = v.height * (w / v.width);
                return { x: cx - w / 2, y: cy - h / 2, width: w, height: h };
            });

            // Wheel zoom centered on the cursor. Native non-passive listener
            // so preventDefault reliably stops page scrolling.
            useEffect(() => {
                const el = svgRef.current;
                if (!el) return;
                const onWheel = (e) => {
                    e.preventDefault();
                    setView(v0 => {
                        const fit = fitBoundsRef.current;
                        const v = v0 || fit;
                        const rect = el.getBoundingClientRect();
                        const px = v.x + (e.clientX - rect.left) * (v.width / rect.width);
                        const py = v.y + (e.clientY - rect.top) * (v.height / rect.height);
                        const f = e.deltaY > 0 ? 1.15 : 1 / 1.15;
                        const w = Math.min(Math.max(v.width * f, 120), fit.width * 3);
                        const h = v.height * (w / v.width);
                        return {
                            x: px - (px - v.x) * (w / v.width),
                            y: py - (py - v.y) * (h / v.height),
                            width: w, height: h
                        };
                    });
                };
                el.addEventListener('wheel', onWheel, { passive: false });
                return () => el.removeEventListener('wheel', onWheel);
            }, [loading]);
            
            const hexPath = (cx, cy, size) => {
                const points = [];
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 6) + (i * Math.PI / 3);
                    points.push(`${cx + size * Math.cos(angle)},${cy + size * Math.sin(angle)}`);
                }
                return `M${points.join('L')}Z`;
            };
            
            const renderTile = (tile, isEmpty = false) => {
                const isDragging = dragState?.ids?.includes(tile.id) ?? false;
                const isSwapTarget = !isDragging && dragState?.moved && dragState?.ids?.length === 1 && (() => {
                    const src = tiles.find(t => t.id === dragState.ids[0]);
                    return src && tile.q === src.q + dragState.deltaHex.q && tile.r === src.r + dragState.deltaHex.r;
                })();
                const inFloat = !!floatState && !isEmpty && selectedIds.includes(tile.id);
                let pos;
                if (inFloat) {
                    pos = xformN(tile, floatState.pivot, floatState.rot, floatState.mir || 0, {
                        q: floatState.deltaHex.q + (isDragging ? dragState.deltaHex.q : 0),
                        r: floatState.deltaHex.r + (isDragging ? dragState.deltaHex.r : 0)
                    });
                } else {
                    pos = isDragging ? {q: tile.q + dragState.deltaHex.q, r: tile.r + dragState.deltaHex.r} : tile;
                }
                const floatCollides = inFloat && occupiedExclSelection.has(`${pos.q},${pos.r}`);
                const {x, y} = hexToPixel(pos.q, pos.r);
                const color = SECTION_COLORS[tile.section] || '#888';
                
                const isSingleSelected = selectedTile?.id === tile.id;
                const isMultiSelected = selectedIds.includes(tile.id);
                const isUpstream = analysisHighlights.upstream.has(tile.id);
                const isDownstream = analysisHighlights.downstream.has(tile.id);
                const isKeystone = keystoneTiles.has(tile.id);
                const isOrphan = orphanTiles.has(tile.id);
                
                 let opacity = isEmpty ? 0.3 : 1;
                let stroke = 'rgba(255,255,255,0.3)';
                let strokeWidth = 1;

                // Section filter highlight
                if (highlightSections.size > 0 && !isEmpty) {
                    if (!highlightSections.has(tile.section)) {
                        opacity = 0.15;
                    } else {
                        stroke = '#fff'; strokeWidth = 1.5;
                    }
                }

                // Topic Group highlight — dim non-group tiles when a tile with topicGroup is selected
                const selectedGroup = selectedTile?.topicGroup;
                const isSameGroup = selectedGroup && tile.topicGroup === selectedGroup;
                if (selectedGroup && !isEmpty && !analysisMode) {
                    if (!isSameGroup && tile.id !== selectedTile.id) {
                        opacity = Math.min(opacity, 0.2);
                    } else if (isSameGroup && tile.id !== selectedTile.id) {
                        stroke = SECTION_COLORS[tile.section]; strokeWidth = 2;
                    }
                }

                // Prereq highlight — pulse prereqs of selected tile
                const isPrereq = !isEmpty && selectedTile && !selectedTile.isReserved
                    && selectedTile.prereqs?.includes(tile.id);
                if (isPrereq && !analysisMode) {
                    stroke = '#fbbf24'; strokeWidth = 2.5; opacity = 1;
                }

                if (analysisMode) {
                    if (isSingleSelected) { stroke = '#fff'; strokeWidth = 2.5; }
                    else if (isUpstream) { stroke = '#ffeb3b'; strokeWidth = 2; }
                    else if (isDownstream) { stroke = '#80deea'; strokeWidth = 2; }
                    else if (isKeystone) { stroke = '#f48fb1'; strokeWidth = 2.5; }
                    else if (isOrphan) { stroke = '#e57373'; strokeWidth = 2; }
                    else opacity = 0.2;
                } else if (selectedIds.length > 0 && !isMultiSelected) {
                    opacity = 0.2;
                }

                if (isMultiSelected) { stroke = '#fff'; strokeWidth = 2; }
                if (isSingleSelected) { stroke = '#fff'; strokeWidth = 2.5; }
                if (isDragging) { stroke = '#00e5ff'; }
                if (isSwapTarget) { stroke = '#fbbf24'; strokeWidth = 2.5; opacity = 1; }
                if (inFloat) { stroke = '#00e5ff'; strokeWidth = 2; }
                if (floatCollides) { stroke = '#ef4444'; strokeWidth = 2.5; }

                return (
                    <g key={tile.id} className={isPrereq && !analysisMode ? 'prereq-glow' : ''}
                    onClick={(e) => { if (!dragState?.moved) handleTileClick(e, tile); }}
                    onDoubleClick={(e) => { e.stopPropagation(); if (!isEmpty) selectIsland(tile); }}
                    onMouseDown={(e) => {
                            // Middle button / Alt+drag = camera pan, even over tiles
                            if (e.button === 1 || e.altKey) return;
                            // Empty slots are not draggable: no id means the drag
                            // matched every empty slot at once. Let the event fall
                            // through to the background (box select).
                            if (isEmpty) return;
                            e.stopPropagation();
                            const idsToDrag = selectedIds.includes(tile.id) ? selectedIds : [tile.id];
                            const anchorTile = tiles.find(t => t.id === idsToDrag[0]);
                            setDragState({
                                ids: idsToDrag,
                                anchor: anchorTile,
                                startPos: { x: e.clientX, y: e.clientY },
                                deltaHex: { q: 0, r: 0 },
                                moved: false
                            });
                    }}>
                        <path d={hexPath(x, y, hexSize * 0.88)} fill={color} fillOpacity={opacity} stroke={stroke} strokeWidth={strokeWidth} strokeDasharray={isEmpty || tile.isReserved ? '3,2' : 'none'} />
                        {isEmpty ? (
                            <>
                                <text x={x} y={y - 3} textAnchor="middle" dominantBaseline="middle" fill="#555" fontSize="4.5">
                                    {tile.q},{tile.r}
                                </text>
                            </>
                        ) : (
                            <text x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill="white" fontSize="6" fontWeight="bold" opacity={tile.isReserved ? 0.6 : opacity}>
                                {tile.isReserved ? '?' : tile.id.split('-').pop()}
                            </text>
                        )}
                    </g>
                );
            };
            
            if (loading) {
                return <div className="container"><div className="loading">Loading curriculum.json...</div></div>;
            }
            
            if (error) {
                return (
                    <div className="container">
                        <div className="error">
                            Failed to load curriculum data
                            <code>{error}</code>
                        </div>
                    </div>
                );
            }
            
            const realTiles = activeTiles.filter(t => !t.isReserved);
            const reservedTiles = activeTiles.filter(t => t.isReserved);
            
            return (
                <div className="container">
                    <h1>MATH-CS COMPASS - Map Layout Editor</h1>
                    
                    <div className="controls">
                        <label>
                            <input type="checkbox" checked={showEmptySlots} onChange={(e) => setShowEmptySlots(e.target.checked)} />
                            Empty slots
                        </label>
                        <label>
                            <input type="checkbox" checked={showReserved} onChange={(e) => setShowReserved(e.target.checked)} />
                            Reserved
                        </label>
                        <label>
                            <input type="checkbox" checked={showBridges} onChange={(e) => setShowBridges(e.target.checked)} />
                            <span title="Shows the cross-cluster edges of the CURRENT selection (tile / island / section), with hex distances. Select something to see its bridges.">Bridges</span>
                        </label>
                    </div>

                    <div style={{ fontSize: '0.65rem', color: '#6b7280', marginBottom: '10px', display: 'flex', gap: '16px', flexWrap: 'wrap' }}>
                        <span>🔍 <b>Wheel</b> zoom, <b>Alt/Middle-Drag</b> pan</span>
                        <span>🗺 <b>select</b> button on a section row to grab the whole section</span>
                        <span>⟳ <b>R / Shift+R</b> rotate, <b>F</b> flip, <b>arrows</b> nudge selection</span>
                        <span>🖱 <b>Drag Tile</b> to move</span>
                        <span>📐 <b>Drag Background</b> to box select</span>
                        <span>🔀 <b>Drag onto</b> another tile to swap</span>
                        <span>⌨️ <b>Ctrl/⌘ + Click/Drag</b> multi-select</span>
                        <span>↩️ <b>Ctrl+Z</b> undo</span>
                        <span>➕ Click <b>empty slot</b> to add reserved</span>
                        <span>🗑 Select reserved + <b>Delete</b> to remove</span>
                    </div>
                    
                    <div className="main-content">
                        <div className="map-container">
                            <div className="zoom-controls-editor">
                                <button title="Zoom in" onClick={() => zoomBy(1 / 1.3)}>+</button>
                                <button title="Zoom out" onClick={() => zoomBy(1.3)}>&minus;</button>
                                <button className="fit" title="Fit to content" onClick={() => setView(null)}>Fit</button>
                            </div>
                            <svg
                                ref={svgRef}
                                viewBox={`${vb.x} ${vb.y} ${vb.width} ${vb.height}`}
                                onMouseDown={(e) => {
                                    // Middle button or Alt+drag pans the camera
                                    if (e.button === 1 || e.altKey) {
                                        e.preventDefault();
                                        setPanState({ startX: e.clientX, startY: e.clientY, view: vb });
                                        return;
                                    }
                                    // Start Box Selection if clicked on the SVG background
                                    const svg = e.currentTarget;
                                    const rect = svg.getBoundingClientRect();
                                    const scaleX = vb.width / rect.width;
                                    const scaleY = vb.height / rect.height;
                                    const x = (e.clientX - rect.left) * scaleX + vb.x;
                                    const y = (e.clientY - rect.top) * scaleY + vb.y;

                                    setSelectionBox({
                                        startX: x,
                                        startY: y,
                                        currentX: x,
                                        currentY: y,
                                        isCtrl: e.shiftKey || e.ctrlKey || e.metaKey
                                    });
                                }}
                                onMouseMove={(e) => {
                                    const svg = e.currentTarget;
                                    const rect = svg.getBoundingClientRect();
                                    const scaleX = vb.width / rect.width;
                                    const scaleY = vb.height / rect.height;

                                    // Handle camera panning (delta from gesture start,
                                    // against the view captured at gesture start)
                                    if (panState) {
                                        setView({
                                            ...panState.view,
                                            x: panState.view.x - (e.clientX - panState.startX) * (panState.view.width / rect.width),
                                            y: panState.view.y - (e.clientY - panState.startY) * (panState.view.height / rect.height)
                                        });
                                        return;
                                    }

                                    // Handle Box Selection
                                    if (selectionBox) {
                                        const x = (e.clientX - rect.left) * scaleX + vb.x;
                                        const y = (e.clientY - rect.top) * scaleY + vb.y;
                                        setSelectionBox(prev => ({ ...prev, currentX: x, currentY: y }));
                                        return;
                                    }

                                    // Handle Tile Dragging
                                    if (!dragState) return;
                                    const dx_screen = e.clientX - dragState.startPos.x;
                                    const dy_screen = e.clientY - dragState.startPos.y;
                                    if (!dragState.moved && Math.hypot(dx_screen, dy_screen) < 3) return;
                                    
                                    const dx = dx_screen * scaleX;
                                    const dy = dy_screen * scaleY;
                                    setDragState(s => ({...s, deltaHex: pixelToHex(dx, dy), moved: true }));
                                }}
                                onMouseUp={() => {
                                    // Finish camera panning
                                    if (panState) { setPanState(null); return; }
                                    // Finish Box Selection
                                    if (selectionBox) {
                                        const minX = Math.min(selectionBox.startX, selectionBox.currentX);
                                        const maxX = Math.max(selectionBox.startX, selectionBox.currentX);
                                        const minY = Math.min(selectionBox.startY, selectionBox.currentY);
                                        const maxY = Math.max(selectionBox.startY, selectionBox.currentY);

                                        // Find all active tiles inside the selection box
                                        const selectedInBox = [];
                                        activeTiles.forEach(tile => {
                                            const {x, y} = hexToPixel(tile.q, tile.r);
                                            if (x >= minX && x <= maxX && y >= minY && y <= maxY) {
                                                selectedInBox.push(tile.id);
                                            }
                                        });

                                        if (selectionBox.isCtrl) {
                                            // Toggle selection for multi-select
                                            setSelectedIds(prev => {
                                                const newSet = new Set(prev);
                                                selectedInBox.forEach(id => {
                                                    if (newSet.has(id)) newSet.delete(id);
                                                    else newSet.add(id);
                                                });
                                                return Array.from(newSet);
                                            });
                                        } else {
                                            // New selection
                                            setSelectedIds(selectedInBox);
                                            if (selectedInBox.length === 1) {
                                                setSelectedTile(tiles.find(t => t.id === selectedInBox[0]));
                                            } else {
                                                setSelectedTile(null);
                                            }
                                        }
                                        setSelectionBox(null);
                                        return;
                                    }

                                    // Finish Tile Dragging
                                    if (dragState?.moved && dragState.deltaHex) {
                                        const { ids, deltaHex } = dragState;
                                        if (deltaHex.q !== 0 || deltaHex.r !== 0) {
                                            const idSet = new Set(ids);

                                            // Single tile drag — check for swap target
                                            if (ids.length === 1) {
                                                const dragged = tiles.find(t => t.id === ids[0]);
                                                const targetQ = dragged.q + deltaHex.q;
                                                const targetR = dragged.r + deltaHex.r;
                                                const targetTile = tiles.find(t => t.id !== dragged.id && t.q === targetQ && t.r === targetR);

                                                if (targetTile) {
                                                    const newTiles = tiles.map(t => {
                                                        if (t.id === dragged.id) return { ...t, q: targetTile.q, r: targetTile.r };
                                                        if (t.id === targetTile.id) return { ...t, q: dragged.q, r: dragged.r };
                                                        return t;
                                                    });
                                                    saveHistory(tiles);
                                                    setTiles(newTiles);
                                                    setDragState(null);
                                                    return;
                                                }
                                            }

                                            // Dropping a floating selection: fold the drag
                                            // delta into the pending transform; commits if
                                            // free, otherwise stays floating where dropped.
                                            if (floatState) {
                                                applyTransformOrFloat(floatState.pivot, floatState.rot, floatState.mir || 0, {
