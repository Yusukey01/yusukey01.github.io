                                                    q: floatState.deltaHex.q + deltaHex.q,
                                                    r: floatState.deltaHex.r + deltaHex.r
                                                });
                                                setDragState(null);
                                                return;
                                            }

                                            // Multi-tile or no collision — normal move
                                            const targetPositions = new Set(ids.map(id => {
                                                const t = tiles.find(ti => ti.id === id);
                                                return `${t.q + deltaHex.q},${t.r + deltaHex.r}`;
                                            }));
                                            const collision = tiles.some(t => !idSet.has(t.id) && targetPositions.has(`${t.q},${t.r}`));

                                            if (!collision) {
                                                const newTiles = tiles.map(t => idSet.has(t.id) ? { ...t, q: t.q + deltaHex.q, r: t.r + deltaHex.r } : t);
                                                saveHistory(tiles);
                                                setTiles(newTiles);
                                            }
                                        }
                                    }
                                    setDragState(null);
                                }}
                                onMouseLeave={() => {
                                    setDraggingId(null);
                                    setDragHex(null);
                                    setSelectionBox(null); // Cancel box selection if mouse leaves SVG
                                    setDragState(null);    // A drag released outside the SVG must not stay stuck
                                    setPanState(null);
                                }}
                            >
                                <rect x={vb.x} y={vb.y} width={vb.width} height={vb.height} fill="url(#grid)" />
                                {showEmptySlots && emptySlots.map(tile => renderTile(tile, true))}
                                {activeTiles.map(tile => renderTile(tile, false))}
                                {showBridges && bridges.mode === 'selection' && bridges.edges.map((b, i) => (
                                    <g key={`sedge-${i}`} style={{ pointerEvents: 'none' }}>
                                        <line x1={b.x1} y1={b.y1} x2={b.x2} y2={b.y2}
                                            stroke={b.color} strokeWidth={2} strokeDasharray="6,4"
                                            strokeOpacity={0.9} strokeLinecap="round" />
                                        <circle cx={b.fx} cy={b.fy} r={5} fill={b.color} stroke="#030712" strokeWidth={1.5} />
                                        <text x={(b.x1 + b.x2) / 2} y={(b.y1 + b.y2) / 2 - 5}
                                            textAnchor="middle" fill="#ffffff" fontSize={12} fontWeight="bold"
                                            style={{ paintOrder: 'stroke', stroke: '#030712', strokeWidth: 3.5 }}>
                                            {b.d}
                                        </text>
                                    </g>
                                ))}
                                {/* Render the Selection Box */}
                                {selectionBox && (
                                    <rect 
                                        x={Math.min(selectionBox.startX, selectionBox.currentX)}
                                        y={Math.min(selectionBox.startY, selectionBox.currentY)}
                                        width={Math.abs(selectionBox.currentX - selectionBox.startX)}
                                        height={Math.abs(selectionBox.currentY - selectionBox.startY)}
                                        fill="rgba(139, 92, 246, 0.15)"
                                        stroke="#8b5cf6"
                                        strokeWidth={1.5 * (vb.width / 800)} // Scale line width based on zoom
                                        strokeDasharray="4,4"
                                        pointerEvents="none" // Prevent the box from blocking mouse events
                                    />
                                )}
                            </svg>
                        </div>
                        
                        <div className="info-panel">
                            {addReservedTarget ? (
                                <div className="info-box">
                                    <h3>📍 Add Reserved Tile</h3>
                                    <p style={{ marginBottom: '8px' }}><span className="label">Position:</span> q={addReservedTarget.q}, r={addReservedTarget.r}</p>
                                    <p style={{ fontSize: '0.7rem', color: '#9ca3af', marginBottom: '8px' }}>Select a section:</p>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                                        {Object.entries(SECTION_NAMES).filter(([k]) => k !== 'HOME' && k !== 'RESEARCH').map(([key, name]) => (
                                            <button key={key}
                                                style={{ ...buttonBaseStyle, backgroundColor: SECTION_COLORS[key], fontSize: '0.75rem' }}
                                                onClick={() => addReservedTile(key, addReservedTarget.q, addReservedTarget.r)}>
                                                {key}: {name}
                                            </button>
                                        ))}
                                    </div>
                                    <button
                                        style={{ ...buttonBaseStyle, backgroundColor: '#4b5563', marginTop: '8px', textAlign: 'center', fontSize: '0.75rem' }}
                                        onClick={() => setAddReservedTarget(null)}>
                                        Cancel
                                    </button>
                                </div>
                            ) : selectedTile ? (
                                <div className="info-box">
                                    <h3>
                                        {selectedTile.section === 'EMPTY' ? '📍 Empty Slot' : selectedTile.isReserved ? '🔮 Reserved' : '📄 ' + selectedTile.id}
                                    </h3>
                                    {selectedTile.section !== 'EMPTY' && (
                                        <p style={{ fontSize: '1rem', fontWeight: 'bold', margin: '8px 0', color: SECTION_COLORS[selectedTile.section] }}>
                                            {selectedTile.title}
                                        </p>
                                    )}
                                    <p><span className="label">Coords:</span> q={selectedTile.q}, r={selectedTile.r}</p>
                                    {selectedTile.section !== 'EMPTY' && <p><span className="label">Section:</span> {SECTION_NAMES[selectedTile.section]}</p>}
                                    {!selectedTile.isReserved && selectedTile.section !== 'EMPTY' && (
                                        <div style={{ marginTop: '8px' }}>
                                            <span className="label">Topic Group:</span>
                                            <div style={{ display: 'flex', gap: '4px', marginTop: '4px' }}>
                                                <select
                                                    value={selectedTile.topicGroup || ''}
                                                    onChange={(e) => {
                                                        const val = e.target.value || null;
                                                        const newTiles = tiles.map(t => t.id === selectedTile.id ? { ...t, topicGroup: val } : t);
                                                        setTiles(newTiles);
                                                        setSelectedTile(prev => ({ ...prev, topicGroup: val }));
                                                    }}
                                                    style={{ flex: 1, background: '#374151', color: '#fff', border: '1px solid #4b5563', borderRadius: '4px', padding: '4px 6px', fontSize: '0.7rem' }}
                                                >
                                                    <option value="">None</option>
                                                    {Object.entries(topicGroupNames).map(([key, name]) => (
                                                        <option key={key} value={key}>{name} ({key})</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <input
                                                type="text"
                                                placeholder="or type new group-id"
                                                style={{ width: '100%', marginTop: '4px', background: '#374151', color: '#fff', border: '1px solid #4b5563', borderRadius: '4px', padding: '4px 6px', fontSize: '0.65rem' }}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter' && e.target.value.trim()) {
                                                        const newGroup = e.target.value.trim().toLowerCase().replace(/\s+/g, '-');
                                                        const newTiles = tiles.map(t => t.id === selectedTile.id ? { ...t, topicGroup: newGroup } : t);
                                                        setTiles(newTiles);
                                                        setSelectedTile(prev => ({ ...prev, topicGroup: newGroup }));
                                                        const formatGroupName = (id) => id.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                                                        setTopicGroupNames(prev => ({ ...prev, [newGroup]: formatGroupName(newGroup) }));
                                                        e.target.value = '';
                                                    }
                                                }}
                                            />
                                        </div>
                                    )}
                                    {!selectedTile.isReserved && selectedTile.section !== 'EMPTY' && selectedTile.topicGroup && (
                                        <div style={{ display: 'flex', gap: '4px', marginTop: '8px' }}>
                                            <button
                                                style={{ ...buttonBaseStyle, backgroundColor: '#0e7490', textAlign: 'center', fontSize: '0.7rem', flex: 1 }}
                                                onClick={() => selectIsland(selectedTile)}>
                                                ◎ Select island
                                            </button>
                                            <button
                                                style={{ ...buttonBaseStyle, backgroundColor: '#7c3aed', textAlign: 'center', fontSize: '0.7rem', flex: 1 }}
                                                onClick={() => compactSingleIsland(selectedTile)}>
                                                ✦ Compact island
                                            </button>
                                        </div>
                                    )}
                                    {!selectedTile.isReserved && selectedTile.section !== 'EMPTY' && (
                                        <div style={{ marginTop: '8px' }}>
                                            <span className="label">Prereqs:</span>
                                            {(selectedTile.prereqs && selectedTile.prereqs.length > 0) ? (
                                                <div style={{ display: 'flex', flexDirection: 'column', gap: '2px', marginTop: '4px' }}>
                                                    {selectedTile.prereqs.map(pId => {
                                                        const pTile = tiles.find(t => t.id === pId);
                                                        return (
                                                            <div key={pId} style={{ display: 'flex', alignItems: 'center', gap: '4px', background: '#374151', borderRadius: '4px', padding: '3px 6px' }}>
                                                                <span style={{ flex: 1, fontSize: '0.65rem', color: pTile ? SECTION_COLORS[pTile.section] : '#9ca3af' }}>
                                                                    {pId}{pTile ? ` — ${pTile.title}` : ' (not found)'}
                                                                </span>
                                                                <button
                                                                    onClick={() => {
                                                                        const newPrereqs = selectedTile.prereqs.filter(id => id !== pId);
                                                                        const newTiles = tiles.map(t => t.id === selectedTile.id ? { ...t, prereqs: newPrereqs } : t);
                                                                        setTiles(newTiles);
                                                                        setSelectedTile(prev => ({ ...prev, prereqs: newPrereqs }));
                                                                    }}
                                                                    style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: '0.75rem', padding: '0 2px' }}
                                                                >✕</button>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ) : (
                                                <p style={{ fontSize: '0.65rem', color: '#6b7280', marginTop: '2px' }}>None</p>
                                            )}
                                            <div style={{ marginTop: '4px' }}>
                                                <select
                                                    value=""
                                                    onChange={(e) => {
                                                        if (!e.target.value) return;
                                                        const newId = e.target.value;
                                                        if (selectedTile.prereqs?.includes(newId)) return;
                                                        const newPrereqs = [...(selectedTile.prereqs || []), newId];
                                                        const newTiles = tiles.map(t => t.id === selectedTile.id ? { ...t, prereqs: newPrereqs } : t);
                                                        setTiles(newTiles);
                                                        setSelectedTile(prev => ({ ...prev, prereqs: newPrereqs }));
                                                    }}
                                                    style={{ width: '100%', background: '#374151', color: '#fff', border: '1px solid #4b5563', borderRadius: '4px', padding: '4px 6px', fontSize: '0.65rem' }}
                                                >
                                                    <option value="">+ Add prereq...</option>
                                                    {Object.entries(SECTION_NAMES).filter(([k]) => k !== 'HOME' && k !== 'EMPTY').map(([secKey, secName]) => (
                                                        <optgroup key={secKey} label={`${secKey}: ${secName}`}>
                                                            {tiles
                                                                .filter(t => t.section === secKey && !t.isReserved && t.id !== selectedTile.id && !(selectedTile.prereqs || []).includes(t.id))
                                                                .map(t => (
                                                                    <option key={t.id} value={t.id}>{t.id} — {t.title}</option>
                                                                ))
                                                            }
                                                        </optgroup>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>
                                    )}
                                    {selectedTile.isReserved && (
                                        <button
                                            style={{ ...buttonBaseStyle, backgroundColor: '#dc2626', marginTop: '8px', textAlign: 'center', fontSize: '0.75rem' }}
                                            onClick={deleteSelectedReserved}>
                                            🗑 Delete Reserved Tile
                                        </button>
                                    )}
                                </div>
                            ) : selectedIds.length >= 2 ? (
                                <div className="info-box">
                                    <h3>🧩 {selectedIds.length} tiles selected</h3>
                                    {floatState ? (
                                        <p style={{ color: '#ef4444', marginBottom: '8px' }}>
                                            ⚠ Rotated shape overlaps other tiles — keep rotating (R) or drag it to a free spot; it commits automatically. Esc cancels.
                                        </p>
                                    ) : (
                                        <p style={{ color: '#9ca3af', marginBottom: '8px' }}>Drag any of them to move the group.</p>
                                    )}
                                    <div style={{ display: 'flex', gap: '6px' }}>
                                        <button style={{ ...buttonBaseStyle, backgroundColor: '#374151', flex: 1 }}
                                            title="Rotate 60 degrees counter-clockwise (Shift+R)"
                                            onClick={() => rotateSelection('ccw')}>
                                            ⟲ Rotate CCW
                                        </button>
                                        <button style={{ ...buttonBaseStyle, backgroundColor: '#374151', flex: 1 }}
                                            title="Rotate 60 degrees clockwise (R)"
                                            onClick={() => rotateSelection('cw')}>
                                            ⟳ Rotate CW
                                        </button>
                                        <button style={{ ...buttonBaseStyle, backgroundColor: '#374151', flex: 1 }}
                                            title="Horizontal flip (F)"
                                            onClick={() => flipSelection()}>
                                            ⇋ Flip
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="info-box" style={{ color: '#9ca3af' }}>Click a tile to see details</div>
                            )}
                            
                            <div className="info-box">
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                                    <h3 style={{ margin: 0 }}>Sections</h3>
                                    {highlightSections.size > 0 && (
                                        <button
                                            onClick={() => setHighlightSections(new Set())}
                                            style={{ background: 'none', border: 'none', color: '#9ca3af', cursor: 'pointer', fontSize: '0.65rem' }}
                                        >Clear filter</button>
                                    )}
                                </div>
                                {Object.entries(SECTION_NAMES).filter(([k]) => k !== 'HOME').map(([key, name]) => {
                                    const count = tiles.filter(t => t.section === key && !t.isReserved).length;
                                    const reserved = tiles.filter(t => t.section === key && t.isReserved).length;
                                    const isActive = highlightSections.has(key);
                                    return (
                                        <div key={key} className="section-stats"
                                            onClick={() => setHighlightSections(prev => {
                                                const next = new Set(prev);
                                                next.has(key) ? next.delete(key) : next.add(key);
                                                return next;
                                            })}
                                            style={{ cursor: 'pointer', padding: '3px 6px', borderRadius: '4px', marginBottom: '2px',
                                                background: isActive ? `${SECTION_COLORS[key]}22` : 'transparent',
                                                borderLeft: isActive ? `3px solid ${SECTION_COLORS[key]}` : '3px solid transparent',
                                                opacity: highlightSections.size > 0 && !isActive ? 0.4 : 1,
                                                transition: 'all 0.15s' }}>
                                            <span style={{ color: SECTION_COLORS[key] }}>{key}: {name}</span>
                                            <span style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                {count} {reserved > 0 && <span className="count-reserved">(+{reserved})</span>}
                                                <button
                                                    title="Select all tiles in this section (drag any of them to move the whole section)"
                                                    onClick={(e) => { e.stopPropagation(); selectSection(key); }}
                                                    style={{ background: '#374151', border: 'none', color: '#e5e7eb',
                                                             borderRadius: '4px', padding: '1px 6px', fontSize: '0.6rem',
                                                             cursor: 'pointer' }}>
                                                    select
                                                </button>
                                            </span>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="info-box">
                                <h3>Analysis Tools</h3>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                    <button 
                                        onClick={() => setAnalysisMode(analysisMode === 'full_chain' ? null : 'full_chain')} 
                                        style={analysisButtonStyles.fullChain}
                                    >
                                        🔗 Show Full Chain
                                    </button>
                                    <button 
                                        onClick={() => setAnalysisMode(analysisMode === 'keystones' ? null : 'keystones')} 
                                        style={analysisButtonStyles.keystones}
                                    >
                                        💎 Find Keystones
                                    </button>
                                    <button 
                                        onClick={() => setAnalysisMode(analysisMode === 'orphans' ? null : 'orphans')} 
                                        style={analysisButtonStyles.orphans}
                                    >
                                        💔 Find Orphans
                                    </button>
                                    {analysisMode && 
                                        <button 
                                            onClick={() => setAnalysisMode(null)} 
                                            style={analysisButtonStyles.clear}
                                        >
                                            ❌ Clear Analysis
                                        </button>
                                    }
                                </div>
                                <p style={{fontSize: '0.7rem', color: '#6b7280', marginTop: '8px'}}>
                                    Select a tile to see its chain. Keystones/Orphans apply to the whole map.
                                </p>
                            </div>
                            
                            <div className="info-box">
                                <h3>📏 Layout Metrics</h3>
                                <div style={{ fontSize: '0.75rem', color: '#d1d5db', display: 'flex', justifyContent: 'space-between' }}>
                                    <span>Total edge length</span><b>{layoutMetrics.total}</b>
                                </div>
                                <div style={{ fontSize: '0.75rem', color: '#d1d5db', display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
                                    <span>Cross-cluster ({layoutMetrics.crossCount} edges)</span><b>{layoutMetrics.cross}</b>
                                </div>
                                <div style={{ fontSize: '0.65rem', color: '#9ca3af', marginBottom: '2px' }}>Longest bridges (click to select the pair):</div>
                                {layoutMetrics.top.map((e, i) => (
                                    <div key={i}
                                        onClick={() => { setFloatState(null); setSelectedTile(null); setSelectedIds([e.a.id, e.b.id]); }}
                                        style={{ fontSize: '0.68rem', color: '#e5e7eb', cursor: 'pointer', padding: '2px 4px',
                                                 borderRadius: '3px', display: 'flex', justifyContent: 'space-between', gap: '6px' }}
                                        onMouseEnter={ev => ev.currentTarget.style.background = '#374151'}
                                        onMouseLeave={ev => ev.currentTarget.style.background = 'transparent'}>
                                        <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                            {e.a.id} ↔ {e.b.id}
                                        </span>
                                        <b>{e.d}</b>
                                    </div>
                                ))}
                            </div>

                            <div className="info-box">
                                <h3>Island Layout</h3>
                                <p style={{ color: '#9ca3af', marginBottom: '8px' }}>
                                    Compacts every topic-group island into a tight hub-centered blob, in place.
                                    Islands never move into each other's cells — placement stays manual (drag).
                                </p>
                                <button 
                                    style={{ width: '100%', padding: '8px', backgroundColor: '#8b5cf6', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold' }}
                                    onClick={() => {
                                        if(window.confirm("This compacts all islands in place. Island positions are preserved; only tiles within each island are rearranged. Ctrl+Z to undo. Proceed?")) {
                                            performAutoLayout();
                                        }
                                    }}
                                >
                                    ✨ Compact All Islands
                                </button>
                                <p style={{ fontSize: '0.7rem', color: '#6b7280', marginTop: '8px' }}>
                                    Tip: double-click a tile to select its whole island, then drag to reposition.
                                </p>
                            </div>

                            <div className="info-box">
                                <h3>📸 Layout Snapshots</h3>
                                <div style={{ display: 'flex', gap: '6px', marginBottom: '6px' }}>
                                    <input value={snapName} onChange={e => setSnapName(e.target.value)}
                                        placeholder="name (A-plan, B-plan...)"
                                        style={{ flex: 1, background: '#111827', color: '#e5e7eb', border: '1px solid #374151',
                                                 borderRadius: '4px', padding: '4px 6px', fontSize: '0.7rem' }} />
                                    <button onClick={saveSnapshot}
                                        style={{ background: '#374151', border: 'none', color: '#e5e7eb',
                                                 borderRadius: '4px', padding: '4px 8px', fontSize: '0.7rem', cursor: 'pointer' }}>
                                        Save
                                    </button>
                                </div>
                                {Object.keys(snapshots).length === 0 && (
                                    <div style={{ fontSize: '0.65rem', color: '#6b7280' }}>No snapshots yet. Saved layouts live in this browser (localStorage).</div>
                                )}
                                {Object.entries(snapshots).sort((a, b) => b[1].savedAt - a[1].savedAt).map(([name, snap]) => (
                                    <div key={name} style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '0.68rem', padding: '2px 0' }}>
                                        <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={new Date(snap.savedAt).toLocaleString()}>{name}</span>
                                        <button onClick={() => loadSnapshot(name)}
                                            style={{ background: '#1f4b8f', border: 'none', color: '#fff', borderRadius: '3px', padding: '2px 7px', fontSize: '0.62rem', cursor: 'pointer' }}>Load</button>
                                        <button onClick={() => deleteSnapshot(name)}
                                            style={{ background: '#7f1d1d', border: 'none', color: '#fff', borderRadius: '3px', padding: '2px 6px', fontSize: '0.62rem', cursor: 'pointer' }}>×</button>
                                    </div>
                                ))}
                            </div>

                            <div className="info-box" style={{ marginTop: 'auto' }}>
                                <h3 style={{ marginBottom: '8px' }}>Data Management</h3>
                                <p style={{ color: '#9ca3af', marginBottom: '12px' }}>
                                    Organize the map, then download the updated JSON file.
                                </p>
                                <div style={{ fontSize: '0.68rem', color: '#9ca3af', marginBottom: '8px',
                                              display: 'flex', alignItems: 'center', gap: '8px' }}>
                                    <span>Source: <b style={{ color: dataSource === 'server' ? '#9ca3af' : '#fbbf24' }}>{dataSource === 'server' ? 'server (fetched)' : dataSource}</b></span>
                                    {dataSource !== 'server' && (
                                        <button
                                            title="Discard the loaded file and reload the server curriculum.json"
                                            onClick={reloadFromServer}
                                            style={{ background: '#7f1d1d', border: 'none', color: '#fff',
                                                     borderRadius: '3px', padding: '2px 8px', fontSize: '0.62rem', cursor: 'pointer' }}>
                                            × discard, reload server
                                        </button>
                                    )}
                                </div>
                                <button
                                    style={{ width: '100%', padding: '8px', backgroundColor: '#374151', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', marginBottom: '8px' }}
                                    onClick={() => fileInputRef.current && fileInputRef.current.click()}
                                >
                                    📂 Load curriculum.json… (or drop it anywhere)
                                </button>
                                <input ref={fileInputRef} type="file" accept=".json,application/json"
                                    style={{ display: 'none' }}
                                    onChange={(e) => {
                                        const f = e.target.files && e.target.files[0];
                                        if (f) loadFromLocalFile(f);
                                        e.target.value = '';
                                    }} />
                                <button 
                                    style={{ width: '100%', padding: '10px', backgroundColor: '#10b981', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold' }}
                                    onClick={exportToJson}
                                >
                                    💾 Download curriculum.json
                                </button>
                                <p style={{ fontSize: '0.7rem', color: '#6b7280', marginTop: '8px' }}>
                                    Note: This will not update the server file.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<HexMapEditor />, document.getElementById('root'));
    </script>
</body>
</html>
