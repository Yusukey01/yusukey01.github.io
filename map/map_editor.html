<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATH-CS COMPASS - Map Layout Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111827;
            color: #fff;
            min-height: 100vh;
        }
        .container { padding: 16px; max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 1.25rem; margin-bottom: 12px; }
        .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
        .controls label { display: flex; align-items: center; gap: 6px; font-size: 0.875rem; cursor: pointer; }
        .controls input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .filter-group { display: flex; gap: 6px; align-items: center; margin-left: 8px; }
        .filter-label { font-size: 0.75rem; color: #9ca3af; }
        .filter-btn { 
            padding: 4px 8px; font-size: 0.75rem; border: none; border-radius: 4px; 
            cursor: pointer; transition: all 0.15s;
        }
        .filter-btn.active { background: #fff; color: #000; }
        .filter-btn:not(.active) { background: #374151; color: #fff; opacity: 0.7; }
        .filter-btn:hover { opacity: 1; }
        .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.75rem; margin-bottom: 12px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; }
        .main-content { display: flex; gap: 16px; }
        .map-container { 
            flex: 1; background: #030712; border-radius: 8px; 
            overflow: auto; height: calc(100vh - 160px);
            min-height: 500px;
        }
        .map-container svg { 
            width: 100%;
            height: 100%;
            min-height: 800px;
        }
        .info-panel { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }
        .info-box { background: #1f2937; padding: 12px; border-radius: 8px; font-size: 0.75rem; }
        .info-box h3 { font-size: 0.875rem; margin-bottom: 8px; border-bottom: 1px solid #374151; padding-bottom: 4px; }
        .info-box p { margin-bottom: 4px; }
        .info-box .label { color: #9ca3af; }
        .info-box .url-link { color: #60a5fa; text-decoration: none; word-break: break-all; font-size: 0.7rem; }
        .section-stats { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .count-reserved { color: #6b7280; }
        svg text { user-select: none; pointer-events: none; }
        svg g { cursor: pointer; }
        svg g:hover path { filter: brightness(1.2); }
        .loading { text-align: center; padding: 40px; color: #9ca3af; }
        
        /* Export Button Styling */
        .export-section { margin-top: auto; padding-top: 12px; }
        .export-btn {
            width: 100%;
            padding: 12px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }
        .export-btn:hover { background-color: #059669; transform: translateY(-1px); }
        .export-btn:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const SECTION_COLORS = {
            'HOME': '#888888', 'I': '#1565c0', 'II': '#2e7d32',
            'III': "#00838f", 'IV': '#6a1b9a', 'V': '#ef6c00', 'EMPTY': '#2a2a2a'
        };

        const SECTION_NAMES = {
            'HOME': 'Home', 'I': 'Algebraic Structures', 'II': 'Calculus & Analysis',
            'III': 'Probability & Statistics', 'IV': 'Discrete Math', 'V': 'Machine Learning'
        };
        
        const SECTION_SHORT_NAMES = {
            'HOME': 'Home', 'I': 'LinAlg', 'II': 'Calc', 'III': 'Prob', 'IV': 'Disc', 'V': 'ML'
        };

        /**
         * Dynamic data loading and topic group extraction
         */
        async function loadCurriculumData() {
            const response = await fetch('../data/curriculum.json');
            const data = await response.json();
            
            const tiles = [];
            const foundGroups = {}; // To store dynamic topic group names

            // Helper to format ID to Title Case
            const formatGroupName = (id) => id.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

            // 1. Process Home Node
            if (data.homeNode) {
                tiles.push({
                    id: data.homeNode.id, section: 'HOME', title: data.homeNode.title,
                    url: data.homeNode.url, q: data.homeNode.mapCoords.q, r: data.homeNode.mapCoords.r
                });
            }
            
            // 2. Process Sections
            Object.entries(data.sections).forEach(([sectionId, section]) => {
                section.parts.forEach(part => {
                    tiles.push({
                        id: part.id, section: sectionId, title: part.title,
                        url: section.baseUrl + part.url, q: part.mapCoords.q, r: part.mapCoords.r,
                        prereqs: part.prereqs || [], keywords: part.keywords || [],
                        topicGroup: part.topicGroup || null
                    });
                    if (part.topicGroup) foundGroups[part.topicGroup] = formatGroupName(part.topicGroup);
                });
                
                // 3. Process Reserved Slots
                if (section.reservedSlots) {
                    section.reservedSlots.forEach((slot, index) => {
                        tiles.push({
                            id: `${sectionId}-reserved-${index}`, section: sectionId,
                            title: 'Coming Soon', url: null, q: slot.q, r: slot.r,
                            isReserved: true, reservedIndex: index 
                        });
                    });
                }
            });
            
            return { tiles, rawData: data, topicGroupNames: foundGroups };
        }

        function HexMapEditor() {
            const [tiles, setTiles] = useState([]);
            const [originalData, setOriginalData] = useState(null);
            const [topicGroupNames, setTopicGroupNames] = useState({});
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [selectedTile, setSelectedTile] = useState(null);
            const [showEmptySlots, setShowEmptySlots] = useState(true);
            const [showReserved, setShowReserved] = useState(true);
            const [highlightSection, setHighlightSection] = useState(null);
            const [draggingId, setDraggingId] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const [dragHex, setDragHex] = useState(null);

            const hexSize = 28;

            // Load logic
            useEffect(() => {
                loadCurriculumData()
                    .then(res => {
                        setTiles(res.tiles);
                        setOriginalData(res.rawData);
                        setTopicGroupNames(res.topicGroupNames);
                        setLoading(false);
                    })
                    .catch(err => { setError(err.message); setLoading(false); });
            }, []);

            /**
             * Merges current visual positions back into the original JSON structure.
             */
            const downloadUpdatedJson = () => {
                if (!originalData) return;

                // Deep copy the original data to preserve all text/metadata
                const newJson = JSON.parse(JSON.stringify(originalData));

                // Iterate through our flat tile array and update the source nested structure
                tiles.forEach(tile => {
                    if (tile.section === 'HOME') {
                        newJson.homeNode.mapCoords = { q: tile.q, r: tile.r };
                    } else if (tile.isReserved) {
                        // Sync reserved slots using the stored index
                        const section = newJson.sections[tile.section];
                        if (section && section.reservedSlots[tile.reservedIndex]) {
                            section.reservedSlots[tile.reservedIndex] = { q: tile.q, r: tile.r };
                        }
                    } else {
                        // Sync regular parts by matching ID
                        const section = newJson.sections[tile.section];
                        const part = section.parts.find(p => p.id === tile.id);
                        if (part) {
                            part.mapCoords = { q: tile.q, r: tile.r };
                        }
                    }
                });

                // Generate file download
                const blob = new Blob([JSON.stringify(newJson, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'curriculum.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            // Hex Math Helpers
            const hexToPixel = (q, r) => ({
                x: hexSize * Math.sqrt(3) * (q + r / 2),
                y: hexSize * (3 / 2) * r
            });

            const pixelToHex = (x, y) => {
                const q = (Math.sqrt(3)/3 * x - 1/3 * y) / hexSize;
                const r = (2/3 * y) / hexSize;
                let x1 = q, z1 = r, y1 = -x1 - z1;
                let rx = Math.round(x1), ry = Math.round(y1), rz = Math.round(z1);
                const x_diff = Math.abs(rx - x1), y_diff = Math.abs(ry - y1), z_diff = Math.abs(rz - z1);
                if (x_diff > y_diff && x_diff > z_diff) rx = -ry - rz;
                else if (y_diff > z_diff) ry = -rx - rz;
                else rz = -rx - ry;
                return { q: rx, r: rz };
            };

            const activeTiles = useMemo(() => tiles.filter(t => showReserved || !t.isReserved), [tiles, showReserved]);
            
            const occupiedMap = useMemo(() => {
                const map = new Map();
                activeTiles.forEach(tile => map.set(`${tile.q},${tile.r}`, tile));
                return map;
            }, [activeTiles]);

            const emptySlots = useMemo(() => {
                const slots = [];
                const checked = new Set();
                const neighbors = [[1,0], [-1,0], [0,1], [0,-1], [1,-1], [-1,1]];
                activeTiles.forEach(tile => {
                    neighbors.forEach(([dq, dr]) => {
                        const nq = tile.q + dq, nr = tile.r + dr, key = `${nq},${nr}`;
                        if (!occupiedMap.has(key) && !checked.has(key)) {
                            checked.add(key);
                            const borders = new Set();
                            neighbors.forEach(([ddq, ddr]) => {
                                const n = occupiedMap.get(`${nq+ddq},${nr+ddr}`);
                                if (n && !n.isReserved) borders.add(n.section);
                            });
                            slots.push({ q: nq, r: nr, section: 'EMPTY', borderingSection: Array.from(borders) });
                        }
                    });
                });
                return slots;
            }, [occupiedMap, activeTiles]);

            const viewBox = useMemo(() => {
                const all = [...activeTiles, ...emptySlots];
                if (!all.length) return { x: -100, y: -100, width: 200, height: 200 };
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                all.forEach(t => {
                    const { x, y } = hexToPixel(t.q, t.r);
                    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
                });
                const p = hexSize * 3;
                return { x: minX - p, y: minY - p, width: maxX - minX + p * 2, height: maxY - minY + p * 2 };
            }, [emptySlots, activeTiles]);

            const renderTile = (tile, isEmpty = false) => {
                const isDragging = draggingId === tile.id;
                const pos = isDragging && dragHex ? dragHex : tile;
                const { x, y } = hexToPixel(pos.q, pos.r);
                const isSelected = selectedTile && selectedTile.q === tile.q && selectedTile.r === tile.r;
                const isHighlighted = highlightSection && (tile.section === highlightSection || (isEmpty && tile.borderingSection?.includes(highlightSection)));
                
                let opacity = isEmpty ? 0.2 : 1;
                if (highlightSection && !isHighlighted) opacity = 0.2;
                if (selectedTile && !isEmpty) {
                    const isRelated = isSelected || (selectedTile.topicGroup && tile.topicGroup === selectedTile.topicGroup) || selectedTile.prereqs?.includes(tile.id);
                    if (!isRelated) opacity = 0.2;
                }
                if (tile.isReserved) opacity = Math.min(opacity, 0.4);

                return (
                    <g key={tile.id} onClick={() => setSelectedTile(tile)} onMouseDown={(e) => {
                        e.stopPropagation(); setDraggingId(tile.id);
                        const pt = e.currentTarget.ownerSVGElement.createSVGPoint();
                        pt.x = e.clientX; pt.y = e.clientY;
                        const cursor = pt.matrixTransform(e.currentTarget.ownerSVGElement.getScreenCTM().inverse());
                        const { x: tx, y: ty } = hexToPixel(tile.q, tile.r);
                        setDragOffset({ x: cursor.x - tx, y: cursor.y - ty });
                    }}>
                        <path d={`M${[0,1,2,3,4,5].map(i => {
                            const a = (Math.PI/6)+(i*Math.PI/3);
                            return `${x+(hexSize*0.88)*Math.cos(a)},${y+(hexSize*0.88)*Math.sin(a)}`;
                        }).join('L')}Z`} 
                        fill={SECTION_COLORS[tile.section]} fillOpacity={opacity}
                        stroke={isDragging ? '#00e5ff' : isSelected ? '#fff' : 'rgba(255,255,255,0.2)'} 
                        strokeWidth={isSelected ? 2 : 1} strokeDasharray={isEmpty || tile.isReserved ? '3,2' : 'none'} />
                        {!isEmpty && (
                            <text x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill="white" fontSize="6" fontWeight="bold" opacity={tile.isReserved ? 0.5 : opacity}>
                                {tile.isReserved ? '?' : tile.id.split('-').pop()}
                            </text>
                        )}
                    </g>
                );
            };

            if (loading) return <div className="loading">Initializing Editor...</div>;

            return (
                <div className="container">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <h1>MATH-CS COMPASS - Map Layout Editor</h1>
                        <div className="stats">92 Active Tiles | Drag to move, Shift-drag to swap</div>
                    </div>
                    
                    <div className="controls">
                        <label><input type="checkbox" checked={showEmptySlots} onChange={e => setShowEmptySlots(e.target.checked)} /> Show Grid</label>
                        <label><input type="checkbox" checked={showReserved} onChange={e => setShowReserved(e.target.checked)} /> Show Reserved</label>
                        <div className="filter-group">
                            <button className={`filter-btn ${!highlightSection ? 'active' : ''}`} onClick={() => setHighlightSection(null)}>All</button>
                            {['I','II','III','IV','V'].map(k => (
                                <button key={k} className={`filter-btn ${highlightSection === k ? 'active' : ''}`} style={{ background: highlightSection === k ? SECTION_COLORS[k] : ''}} onClick={() => setHighlightSection(k === highlightSection ? null : k)}>{k}</button>
                            ))}
                        </div>
                    </div>

                    <div className="main-content">
                        <div className="map-container">
                            <svg viewBox={`${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`}
                                onMouseMove={e => {
                                    if (!draggingId) return;
                                    const pt = e.currentTarget.createSVGPoint();
                                    pt.x = e.clientX; pt.y = e.clientY;
                                    const cursor = pt.matrixTransform(e.currentTarget.getScreenCTM().inverse());
                                    setDragHex(pixelToHex(cursor.x - dragOffset.x, cursor.y - dragOffset.y));
                                }}
                                onMouseUp={() => {
                                    if (draggingId && dragHex) {
                                        setTiles(prev => {
                                            const source = prev.find(t => t.id === draggingId);
                                            const target = prev.find(t => t.q === dragHex.q && t.r === dragHex.r && t.id !== draggingId);
                                            return prev.map(t => {
                                                if (t.id === draggingId) return { ...t, q: dragHex.q, r: dragHex.r };
                                                if (target) return { ...t, q: source.q, r: source.r }; // Swap logic
                                                return t;
                                            });
                                        });
                                    }
                                    setDraggingId(null); setDragHex(null);
                                }}>
                                <rect x={viewBox.x} y={viewBox.y} width={viewBox.width} height={viewBox.height} fill="#030712" />
                                {showEmptySlots && emptySlots.map(t => renderTile(t, true))}
                                {activeTiles.map(t => renderTile(t, false))}
                            </svg>
                        </div>

                        <div className="info-panel">
                            <div className="info-box">
                                <h3>Selection Details</h3>
                                {selectedTile ? (
                                    <>
                                        <p style={{ color: SECTION_COLORS[selectedTile.section], fontWeight: 'bold' }}>{selectedTile.title}</p>
                                        <p><span className="label">ID:</span> {selectedTile.id}</p>
                                        <p><span className="label">Coords:</span> q={selectedTile.q}, r={selectedTile.r}</p>
                                        <p><span className="label">Group:</span> {topicGroupNames[selectedTile.topicGroup] || 'None'}</p>
                                    </>
                                ) : <p style={{ color: '#6b7280' }}>Click a tile to view properties</p>}
                            </div>

                            <div className="info-box">
                                <h3>Counts by Section</h3>
                                {['I','II','III','IV','V'].map(k => (
                                    <div key={k} className="section-stats">
                                        <span style={{ color: SECTION_COLORS[k] }}>{SECTION_SHORT_NAMES[k]}:</span>
                                        <span>{tiles.filter(t => t.section === k && !t.isReserved).length} <small className="count-reserved">({tiles.filter(t => t.section === k && t.isReserved).length})</small></span>
                                    </div>
                                ))}
                            </div>

                            <div className="export-section">
                                <button className="export-btn" onClick={downloadUpdatedJson}>
                                    💾 Download curriculum.json
                                </button>
                                <p style={{ fontSize: '0.65rem', color: '#6b7280', marginTop: '8px', textAlign: 'center' }}>
                                    Organize your map, download this file, and replace the one in your <code>data/</code> folder.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<HexMapEditor />, document.getElementById('root'));
    </script>
</body>
</html>
