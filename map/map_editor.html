<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATH-CS COMPASS - Map Layout Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111827;
            color: #fff;
            min-height: 100vh;
        }
        .container { padding: 16px; max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 1.25rem; margin-bottom: 12px; }
        .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
        .controls label { display: flex; align-items: center; gap: 6px; font-size: 0.875rem; cursor: pointer; }
        .controls input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .filter-group { display: flex; gap: 6px; align-items: center; margin-left: 8px; }
        .filter-label { font-size: 0.75rem; color: #9ca3af; }
        .filter-btn { 
            padding: 4px 8px; font-size: 0.75rem; border: none; border-radius: 4px; 
            cursor: pointer; transition: all 0.15s;
        }
        .filter-btn.active { background: #fff; color: #000; }
        .filter-btn:not(.active) { background: #374151; color: #fff; opacity: 0.7; }
        .filter-btn:hover { opacity: 1; }
        .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.75rem; margin-bottom: 12px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; }
        .main-content { display: flex; gap: 16px; }
        .map-container { 
            flex: 1; background: #030712; border-radius: 8px; 
            overflow: auto; max-height: 65vh; min-height: 400px;
            height: calc(100vh - 120px);
            max-height: none;
        }
        .map-container svg { 
            width: 100%;
            height: 100%;
            min-height: 600px;
        }
        .info-panel { width: 280px; flex-shrink: 0; }
        .info-box { background: #1f2937; padding: 12px; border-radius: 8px; font-size: 0.75rem; margin-bottom: 12px; }
        .info-box h3 { font-size: 0.875rem; margin-bottom: 8px; }
        .info-box p { margin-bottom: 4px; }
        .info-box .label { color: #9ca3af; }
        .info-box .available { color: #4ade80; margin-top: 8px; font-weight: 500; }
        .info-box .reserved { color: #facc15; margin-top: 8px; }
        .info-box .url-link { 
            color: #60a5fa; text-decoration: none; word-break: break-all; 
            display: block; margin-top: 4px; font-size: 0.7rem;
        }
        .info-box .url-link:hover { text-decoration: underline; }
        .stats { font-size: 0.75rem; color: #9ca3af; }
        .section-stats { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .section-stats .count-reserved { color: #6b7280; }
        svg text { user-select: none; pointer-events: none; }
        svg g { cursor: pointer; }
        svg g:hover path { filter: brightness(1.2); }
        .loading { text-align: center; padding: 40px; color: #9ca3af; }
        .error { text-align: center; padding: 40px; color: #ef4444; }
        .error code { display: block; margin-top: 12px; font-size: 0.8rem; color: #9ca3af; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const SECTION_COLORS = {
            'HOME': '#888888',
            'I': '#1565c0',
            'II': '#2e7d32',
            'III': "#00838f",
            'IV': '#6a1b9a',
            'V': '#ef6c00',
            'EMPTY': '#2a2a2a'
        };

        const SECTION_NAMES = {
            'HOME': 'Home',
            'I': 'Linear Algebra to Algebraic Foundations',
            'II': 'Calculus to Optimization & Analysis',
            'III': 'Probability & Statistics',
            'IV': 'Discrete Math',
            'V': 'Machine Learning'
        };
        
        // Short names for compact displays
        const SECTION_SHORT_NAMES = {
            'HOME': 'Home',
            'I': 'LinAlg & Algebra',
            'II': 'Calculus & Opt',
            'III': 'Probability',
            'IV': 'Discrete',
            'V': 'ML'
        };

        /**
         * Load curriculum data from JSON file - same logic as compass.html
         */
        async function loadCurriculumData() {
            // Try multiple paths to support different folder structures
            const paths = [
                '../data/curriculum.json',
                './data/curriculum.json',
                '/data/curriculum.json',
                'curriculum.json'
            ];
            
            let data = null;
            let lastError = null;
            
            for (const path of paths) {
                try {
                    const response = await fetch(path);
                    if (response.ok) {
                        data = await response.json();
                        console.log(`Loaded curriculum from: ${path}`);
                        break;
                    }
                } catch (e) {
                    lastError = e;
                }
            }
            
            if (!data) {
                throw new Error(`Could not load curriculum.json. Tried: ${paths.join(', ')}`);
            }
            
            const tiles = [];
            const foundGroups = {}; // To store dynamic topic group names
            const formatGroupName = (id) => id.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

            // Add home node
            if (data.homeNode) {
                tiles.push({
                    id: data.homeNode.id,
                    section: 'HOME',
                    title: data.homeNode.title,
                    url: data.homeNode.url,
                    q: data.homeNode.mapCoords.q,
                    r: data.homeNode.mapCoords.r
                });
            }
            
            // Add all parts from all sections
            Object.entries(data.sections).forEach(([sectionId, section]) => {
                section.parts.forEach(part => {
                    tiles.push({
                        id: part.id,
                        section: sectionId,
                        title: part.title,
                        url: section.baseUrl + part.url,
                        q: part.mapCoords.q,
                        r: part.mapCoords.r,
                        prereqs: part.prereqs || [],
                        keywords: part.keywords || [],
                        topicGroup: part.topicGroup || null
                    });
                    // Dynamically collect topic groups
                    if (part.topicGroup) {
                        foundGroups[part.topicGroup] = formatGroupName(part.topicGroup);
                    }
                });
                
                // Add reserved slots
                if (section.reservedSlots) {
                    section.reservedSlots.forEach((slot, index) => {
                        tiles.push({
                            id: `${sectionId}-reserved-${index}`,
                            section: sectionId,
                            title: 'Coming Soon',
                            url: null,
                            q: slot.q,
                            r: slot.r,
                            isReserved: true,
                            reservedIndex: index, // Track original index for export
                            topicGroup: null
                        });
                    });
                }
            });
            
            // Return rawData and dynamically generated group names as well
            return { tiles, rawData: data, topicGroupNames: foundGroups };
        }

        function HexMapEditor() {
            const [tiles, setTiles] = useState([]);
            const [originalData, setOriginalData] = useState(null); // Holds the full JSON structure
            const [topicGroupNames, setTopicGroupNames] = useState({}); // Holds dynamic group names
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [selectedTile, setSelectedTile] = useState(null);
            const [showEmptySlots, setShowEmptySlots] = useState(true);
            const [showReserved, setShowReserved] = useState(true);
            const [highlightSection, setHighlightSection] = useState(null);
            const [draggingId, setDraggingId] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const [dragHex, setDragHex] = useState(null);

            const [selectedIds, setSelectedIds] = useState([]); // For multi-select
            const [history, setHistory] = useState([]); // For Undo/Redo
            const [historyIndex, setHistoryIndex] = useState(-1); // For Undo/Redo
            const [analysisMode, setAnalysisMode] = useState(null); // For visual analysis

            const hexSize = 28;

            // --- Undo/Redo Logic ---
            // Function to save the current state to history
            const saveHistory = (newTiles) => {
                const newHistory = history.slice(0, historyIndex + 1);
                newHistory.push(newTiles.map(({ q, r, id }) => ({ q, r, id }))); // Store minimal data
                setHistory(newHistory);
                setHistoryIndex(newHistory.length - 1);
            };

            // Undo function
            const undo = () => {
                if (historyIndex > 0) {
                    const prevIndex = historyIndex - 1;
                    const prevState = history[prevIndex];
                    setTiles(currentTiles => 
                        currentTiles.map(tile => {
                            const historyTile = prevState.find(ht => ht.id === tile.id);
                            return historyTile ? { ...tile, q: historyTile.q, r: historyTile.r } : tile;
                        })
                    );
                    setHistoryIndex(prevIndex);
                }
            };

            // Redo function
            const redo = () => {
                if (historyIndex < history.length - 1) {
                    const nextIndex = historyIndex + 1;
                    const nextState = history[nextIndex];
                    setTiles(currentTiles => 
                        currentTiles.map(tile => {
                            const historyTile = nextState.find(ht => ht.id === tile.id);
                            return historyTile ? { ...tile, q: historyTile.q, r: historyTile.r } : tile;
                        })
                    );
                    setHistoryIndex(nextIndex);
                }
            };
            // --- Undo/Redo Logic ---


            // ---  Multi-Select Logic ---
            const handleTileClick = (e, tile) => {
                if (e.shiftKey || e.ctrlKey || e.metaKey) {
                    // Multi-select mode
                    setSelectedIds(prev => 
                        prev.includes(tile.id) ? prev.filter(id => id !== tile.id) : [...prev, tile.id]
                    );
                    setSelectedTile(null); // Clear single selection
                } else {
                    // Single select mode
                    setSelectedTile(tile);
                    setSelectedIds([tile.id]); // Also set as the start of a multi-selection
                }
            };
            

            // --- Analysis Logic ---
            const getAnalysisHighlights = (tile) => {
                if (!tile || !analysisMode) return { upstream: [], downstream: [] };
                
                let upstream = new Set();
                let downstream = new Set();
                
                // Upstream (Prerequisites)
                if (analysisMode === 'prereqs' || analysisMode === 'full_chain') {
                    const toProcess = [...(tile.prereqs || [])];
                    while (toProcess.length > 0) {
                        const id = toProcess.pop();
                        if (!upstream.has(id)) {
                            upstream.add(id);
                            const prereqTile = tiles.find(t => t.id === id);
                            if (prereqTile && prereqTile.prereqs) {
                                toProcess.push(...prereqTile.prereqs);
                            }
                        }
                    }
                }
                
                // Downstream (Dependents)
                if (analysisMode === 'dependents' || analysisMode === 'full_chain') {
                    tiles.forEach(t => {
                        if (t.prereqs && t.prereqs.includes(tile.id)) {
                            downstream.add(t.id);
                        }
                    });
                }

                return { upstream: Array.from(upstream), downstream: Array.from(downstream) };
            };

            const analysisHighlights = useMemo(() => {
                if (!selectedTile || !analysisMode) return { upstream: [], downstream: [] };
                return getAnalysisHighlights(selectedTile);
            }, [selectedTile, analysisMode, tiles]);

            const keystoneTiles = useMemo(() => {
                if (analysisMode !== 'keystones') return [];
                const counts = {};
                tiles.forEach(t => {
                    (t.prereqs || []).forEach(pId => {
                        counts[pId] = (counts[pId] || 0) + 1;
                    });
                });
                const maxCount = Math.max(0, ...Object.values(counts));
                return Object.keys(counts).filter(id => counts[id] > maxCount * 0.5); // Highlight top 50%
            }, [analysisMode, tiles]);

            const orphanTiles = useMemo(() => {
                if (analysisMode !== 'orphans') return [];
                const allPrereqs = new Set();
                tiles.forEach(t => (t.prereqs || []).forEach(pId => allPrereqs.add(pId)));
                return tiles.filter(t => !allPrereqs.has(t.id) && t.section !== 'HOME').map(t => t.id);
            }, [analysisMode, tiles]);

            /**
             * Function to export current tile layout to a JSON file
             */
            const exportToJson = () => {
                if (!originalData) return;

                // Create a deep copy of the original JSON to preserve all text/metadata
                const exportData = JSON.parse(JSON.stringify(originalData));

                // Synchronize coordinates from the current 'tiles' state back into the JSON structure
                tiles.forEach(tile => {
                    if (tile.section === 'HOME') {
                        exportData.homeNode.mapCoords = { q: tile.q, r: tile.r };
                    } else if (tile.isReserved) {
                        // Sync reserved slots using the stored index
                        const section = exportData.sections[tile.section];
                        if (section && section.reservedSlots[tile.reservedIndex]) {
                            section.reservedSlots[tile.reservedIndex] = { q: tile.q, r: tile.r };
                        }
                    } else {
                        // Sync regular parts by matching ID
                        const section = exportData.sections[tile.section];
                        if (section && section.parts) {
                            const part = section.parts.find(p => p.id === tile.id);
                            if (part) {
                                part.mapCoords = { q: tile.q, r: tile.r };
                            }
                        }
                    }
                });

                // Generate and trigger download
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'curriculum.json';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };
            
            //load dara
            useEffect(() => {
                loadCurriculumData()
                    .then(({ tiles, rawData, topicGroupNames }) => {
                        setTiles(tiles);
                        setOriginalData(rawData);
                        setTopicGroupNames(topicGroupNames);
                        setLoading(false);

                        // Initialize history for Undo/Redo
                        const initialHistory = [tiles.map(({ q, r, id }) => ({ q, r, id }))];
                        setHistory(initialHistory);
                        setHistoryIndex(0);
                    })
                    .catch(err => {
                        setError(err.message);
                        setLoading(false);
                    });

                // Add keyboard shortcuts for Undo/Redo
                const handleKeyDown = (e) => {
                    const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
                    const isCtrl = isMac ? e.metaKey : e.ctrlKey;

                    if (isCtrl && e.key === 'z') {
                        e.preventDefault();
                        if (e.shiftKey) {
                            redo();
                        } else {
                            undo();
                        }
                    }
                };
                
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []); // Empty dependency array ensures this runs only once
            
            const activeTiles = useMemo(() => {
                return tiles.filter(t => showReserved || !t.isReserved);
            }, [tiles, showReserved]);
            
            const occupiedMap = useMemo(() => {
                const map = new Map();
                activeTiles.forEach(tile => map.set(`${tile.q},${tile.r}`, tile));
                return map;
            }, [activeTiles]);
            
            const emptySlots = useMemo(() => {
                const slots = [];
                const checked = new Set();
                const neighbors = [[1, 0], [-1, 0], [0, 1], [0, -1], [1, -1], [-1, 1]];
                
                activeTiles.forEach(tile => {
                    neighbors.forEach(([dq, dr]) => {
                        const nq = tile.q + dq, nr = tile.r + dr;
                        const key = `${nq},${nr}`;
                        if (!occupiedMap.has(key) && !checked.has(key)) {
                            checked.add(key);
                            const borderingSection = new Set();
                            neighbors.forEach(([ddq, ddr]) => {
                                const neighbor = occupiedMap.get(`${nq + ddq},${nr + ddr}`);
                                if (neighbor && !neighbor.isReserved) borderingSection.add(neighbor.section);
                            });
                            slots.push({ q: nq, r: nr, section: 'EMPTY', borderingSection: Array.from(borderingSection) });
                        }
                    });
                });
                return slots;
            }, [occupiedMap, activeTiles]);
            
            const hexToPixel = (q, r) => ({
                x: hexSize * Math.sqrt(3) * (q + r / 2),
                y: hexSize * (3 / 2) * r
            });

            const pixelToHex = (x, y) => {
                const q = (Math.sqrt(3)/3 * x - 1/3 * y) / hexSize;
                const r = (2/3 * y) / hexSize;

                let x1 = q;
                let z1 = r;
                let y1 = -x1 - z1;

                let rx = Math.round(x1);
                let ry = Math.round(y1);
                let rz = Math.round(z1);

                const x_diff = Math.abs(rx - x1);
                const y_diff = Math.abs(ry - y1);
                const z_diff = Math.abs(rz - z1);

                if (x_diff > y_diff && x_diff > z_diff) {
                    rx = -ry - rz;
                } else if (y_diff > z_diff) {
                    ry = -rx - rz;
                } else {
                    rz = -rx - ry;
                }

                return { q: rx, r: rz };
            };

            
            const viewBox = useMemo(() => {
                const allTiles = [...activeTiles, ...emptySlots];
                if (allTiles.length === 0) return { x: -100, y: -100, width: 200, height: 200 };
                
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                allTiles.forEach(tile => {
                    const { x, y } = hexToPixel(tile.q, tile.r);
                    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
                });
                const padding = hexSize * 2;
                return { x: minX - padding, y: minY - padding, width: maxX - minX + padding * 2, height: maxY - minY + padding * 2 };
            }, [emptySlots, activeTiles]);
            
            const hexPath = (cx, cy, size) => {
                const points = [];
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 6) + (i * Math.PI / 3);
                    points.push(`${cx + size * Math.cos(angle)},${cy + size * Math.sin(angle)}`);
                }
                return `M${points.join('L')}Z`;
            };
            

            const renderTile = (tile, isEmpty = false) => {
                const isDragging = draggingId && selectedIds.includes(tile.id);
                const pos = isDragging && dragHex ? { q: tile.q + dragHex.q, r: tile.r + dragHex.r } : tile;
                const { x, y } = hexToPixel(pos.q, pos.r);

                const color = SECTION_COLORS[tile.section] || '#888';
                
                // --- Highlighting Logic ---
                const isSingleSelected = selectedTile && selectedTile.id === tile.id;
                const isMultiSelected = selectedIds.includes(tile.id);

                const isUpstream = analysisHighlights.upstream.includes(tile.id);
                const isDownstream = analysisHighlights.downstream.includes(tile.id);
                const isKeystone = keystoneTiles.includes(tile.id);
                const isOrphan = orphanTiles.includes(tile.id);
                
                let opacity = isEmpty ? 0.3 : 1;
                let stroke = 'rgba(255,255,255,0.3)';
                let strokeWidth = 1;

                if (analysisMode) {
                    if (isSingleSelected) {
                        stroke = '#fff'; strokeWidth = 2.5;
                    } else if (isUpstream) {
                        stroke = '#ffeb3b'; strokeWidth = 2; // Yellow for prereqs
                    } else if (isDownstream) {
                        stroke = '#80deea'; strokeWidth = 2; // Cyan for dependents
                    } else if (isKeystone) {
                        stroke = '#f48fb1'; strokeWidth = 2.5; // Pink for keystones
                    } else if (isOrphan) {
                        stroke = '#e57373'; strokeWidth = 2; // Red for orphans
                    } else {
                        opacity = 0.2;
                    }
                } else if (selectedIds.length > 0) {
                    if (!isMultiSelected) opacity = 0.2;
                }

                if (isMultiSelected) {
                    stroke = '#fff'; strokeWidth = 2;
                }
                if (isSingleSelected) {
                    stroke = '#fff'; strokeWidth = 2.5;
                }
                
                if (isDragging) {
                    stroke = '#00e5ff';
                }

                return (
                    <g
                        key={`${tile.id}`}
                        onMouseDown={(e) => {
                            e.stopPropagation();
                            // If clicking an already selected tile, start drag for the whole group
                            const idsToDrag = selectedIds.includes(tile.id) ? selectedIds : [tile.id];
                            setDraggingId(idsToDrag[0]); // Use first selected as drag anchor

                            const pt = e.currentTarget.ownerSVGElement.createSVGPoint();
                            pt.x = e.clientX; pt.y = e.clientY;
                            const cursor = pt.matrixTransform(e.currentTarget.ownerSVGElement.getScreenCTM().inverse());
                            const { x, y } = hexToPixel(tile.q, tile.r);
                            setDragOffset({ x: cursor.x - x, y: cursor.y - y });
                        }}
                        onClick={(e) => handleTileClick(e, tile)}
                    >
                        <path
                            d={hexPath(x, y, hexSize * 0.88)}
                            fill={color}
                            fillOpacity={opacity}
                            stroke={stroke}
                            strokeWidth={strokeWidth}
                            strokeDasharray={isEmpty || tile.isReserved ? '3,2' : 'none'}
                        />
                        {!isEmpty && (
                            <text x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill="white" fontSize="6"
                                fontWeight={tile.isReserved ? 'normal' : 'bold'} opacity={tile.isReserved ? 0.6 : opacity}>
                                {tile.isReserved ? '?' : tile.id.replace(/^[a-z]+-/, '')}
                            </text>
                        )}
                    </g>
                );
            };

            if (loading) {
                return <div className="container"><div className="loading">Loading curriculum.json...</div></div>;
            }
            
            if (error) {
                return (
                    <div className="container">
                        <div className="error">
                            Failed to load curriculum data
                            <code>{error}</code>
                        </div>
                    </div>
                );
            }
            
            const realTiles = activeTiles.filter(t => !t.isReserved);
            const reservedTiles = activeTiles.filter(t => t.isReserved);
            
            return (
                <div className="container">
                    <h1>MATH-CS COMPASS - Map Layout Editor</h1>
                    
                    <div className="controls">
                        <label>
                            <input type="checkbox" checked={showEmptySlots} onChange={(e) => setShowEmptySlots(e.target.checked)} />
                            Empty slots
                        </label>
                        <label>
                            <input type="checkbox" checked={showReserved} onChange={(e) => setShowReserved(e.target.checked)} />
                            Reserved
                        </label>
                        <div className="filter-group">
                            <span className="filter-label">Filter:</span>
                            <button className={`filter-btn ${!highlightSection ? 'active' : ''}`} onClick={() => setHighlightSection(null)}>All</button>
                            {Object.entries(SECTION_NAMES).filter(([k]) => k !== 'HOME').map(([key]) => (
                                <button key={key} className={`filter-btn ${highlightSection === key ? 'active' : ''}`}
                                    style={{ backgroundColor: highlightSection === key ? SECTION_COLORS[key] : undefined }}
                                    onClick={() => setHighlightSection(key === highlightSection ? null : key)}>
                                    {key}
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    <div className="legend">
                        {Object.entries(SECTION_NAMES).map(([key, name]) => (
                            <div key={key} className="legend-item">
                                <div className="legend-color" style={{ backgroundColor: SECTION_COLORS[key] }}></div>
                                <span>{key}: {name}</span>
                            </div>
                        ))}
                    </div>
                    
                    <div className="main-content">
                        <div className="map-container">
                            <svg
                                viewBox={`${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`}
                                onMouseMove={(e) => {
                                    if (!draggingId) return;

                                    const pt = e.currentTarget.createSVGPoint();
                                    pt.x = e.clientX; pt.y = e.clientY;
                                    const cursor = pt.matrixTransform(e.currentTarget.getScreenCTM().inverse());
                                    
                                    // Calculate the delta from the drag anchor
                                    const anchorTile = tiles.find(t => t.id === draggingId);
                                    const anchorPos = hexToPixel(anchorTile.q, anchorTile.r);

                                    const targetPos = { x: cursor.x - dragOffset.x, y: cursor.y - dragOffset.y };
                                    const deltaPixel = { x: targetPos.x - anchorPos.x, y: targetPos.y - anchorPos.y };
                                    const deltaHex = pixelToHex(deltaPixel.x, deltaPixel.y);

                                    setDragHex(deltaHex);
                                }}

                                onMouseUp={(e) => {
                                    if (!draggingId || !dragHex) {
                                        setDraggingId(null);
                                        return;
                                    }

                                    // Check if any target position is already occupied by a non-selected tile
                                    const occupiedByOthers = selectedIds.some(id => {
                                        const sourceTile = tiles.find(t => t.id === id);
                                        if (!sourceTile) return false;
                                        const targetQ = sourceTile.q + dragHex.q;
                                        const targetR = sourceTile.r + dragHex.r;
                                        const occupant = occupiedMap.get(`${targetQ},${targetR}`);
                                        return occupant && !selectedIds.includes(occupant.id);
                                    });

                                    if (occupiedByOthers) {
                                        // Collision detected, cancel move
                                        setDraggingId(null);
                                        setDragHex(null);
                                        // Maybe add a visual indicator for collision failure
                                        return;
                                    }

                                    const newTiles = tiles.map(t => {
                                        if (selectedIds.includes(t.id)) {
                                            // This is one of the tiles being moved
                                            return { ...t, q: t.q + dragHex.q, r: t.r + dragHex.r };
                                        }
                                        return t;
                                    });

                                    setTiles(newTiles);
                                    saveHistory(newTiles); // Save state for Undo

                                    setDraggingId(null);
                                    setDragHex(null);
                                }}
                                onMouseLeave={() => {
                                    setDraggingId(null);
                                    setDragHex(null);
                                }}
                            >
                                <rect x={viewBox.x} y={viewBox.y} width={viewBox.width} height={viewBox.height} fill="url(#grid)" />
                                {showEmptySlots && emptySlots.map(tile => renderTile(tile, true))}
                                {activeTiles.map(tile => renderTile(tile, false))}
                            </svg>
                        </div>
                        
                        <div className="info-panel">
                            {selectedTile ? (
                                <div className="info-box">
                                    <h3>
                                        {selectedTile.section === 'EMPTY' ? '📍 Empty Slot' : selectedTile.isReserved ? '🔮 Reserved' : '📄 ' + selectedTile.id}
                                    </h3>
                                    {selectedTile.section !== 'EMPTY' && (
                                        <p style={{ fontSize: '1rem', fontWeight: 'bold', margin: '8px 0', color: SECTION_COLORS[selectedTile.section] }}>
                                            {selectedTile.title}
                                        </p>
                                    )}
                                    <p><span className="label">Coords:</span> q={selectedTile.q}, r={selectedTile.r}</p>
                                    {selectedTile.section !== 'EMPTY' && <p><span className="label">Section:</span> {SECTION_NAMES[selectedTile.section]}</p>}
                                    {selectedTile.topicGroup && (
                                        <p><span className="label">Topic Group:</span> <span style={{ color: '#60a5fa' }}>{topicGroupNames[selectedTile.topicGroup] || selectedTile.topicGroup}</span></p>
                                    )}
                                </div>
                            ) : (
                                <div className="info-box" style={{ color: '#9ca3af' }}>Click a tile to see details</div>
                            )}
                            
                            <div className="info-box">
                                <h3 style={{ marginBottom: '8px' }}>By Section:</h3>
                                {Object.entries(SECTION_SHORT_NAMES).filter(([k]) => k !== 'HOME').map(([key, name]) => {
                                    const count = tiles.filter(t => t.section === key && !t.isReserved).length;
                                    const reserved = tiles.filter(t => t.section === key && t.isReserved).length;
                                    return (
                                        <div key={key} className="section-stats">
                                            <span style={{ color: SECTION_COLORS[key] }}>{name}:</span>
                                            <span>{count} {reserved > 0 && <span className="count-reserved">(+{reserved})</span>}</span>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="info-box">
                                <h3>Analysis Tools</h3>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                    <button onClick={() => setAnalysisMode('full_chain')}>Show Full Chain</button>
                                    <button onClick={() => setAnalysisMode('keystones')} >Find Keystones</button>
                                    <button onClick={() => setAnalysisMode('orphans')} >Find Orphans</button>
                                    {analysisMode && <button onClick={() => setAnalysisMode(null)} style={{background: '#555'}}>Clear Analysis</button>}
                                </div>
                                <p style={{fontSize: '0.7rem', color: '#6b7280', marginTop: '8px'}}>
                                    Select a single tile first to see its prerequisite chain.
                                </p>
                            </div>

                            <div className="info-box" style={{ marginTop: 'auto' }}>
                                <h3 style={{ marginBottom: '8px' }}>Data Management</h3>
                                <p style={{ color: '#9ca3af', marginBottom: '12px' }}>
                                    Organize the map, then download the updated JSON file.
                                </p>
                                <button 
                                    style={{ width: '100%', padding: '10px', backgroundColor: '#10b981', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold' }}
                                    onClick={exportToJson}
                                >
                                    💾 Download curriculum.json
                                </button>
                                <p style={{ fontSize: '0.7rem', color: '#6b7280', marginTop: '8px' }}>
                                    Note: This will not update the server file.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<HexMapEditor />, document.getElementById('root'));
    </script>
</body>
</html>
