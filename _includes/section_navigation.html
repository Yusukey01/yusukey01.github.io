{% comment %}
  Section Navigation v2 - Loads curriculum.json via JavaScript
{% endcomment %}

<div class="quick-jump-container">
    <button type="button" id="quick-jump-toggle" class="quick-jump-toggle">
      <i class="fas fa-list"></i> <strong id="nav-section-title">Section Navigation</strong>
    </button>
    <div id="quick-jump-menu" class="quick-jump-menu">
      <h3 id="nav-section-heading">Loading...</h3>
      <div id="qj-prevnext" class="qj-prevnext"></div>
      <input type="search" id="qj-filter" class="qj-filter"
             placeholder="Filter pages or concepts&hellip;" autocomplete="off">
      <div class="quick-jump-links" id="nav-links-container">
        <!-- Links will be populated by JavaScript -->
      </div>
      <div class="qj-tools">
        <a href="/map/compass.html"><i class="fas fa-compass"></i> Knowledge Map</a>
        <a id="qj-atlas-link" href="/map/atlas.html"><i class="fas fa-list-ul"></i> Atlas</a>
      </div>
    </div>
</div>

<script>
(function() {
  // Determine current section from URL
  const path = window.location.pathname;
  let sectionKey = null;
  let overviewFile = null;

  if (path.includes('Linear_algebra')) {
    sectionKey = 'I';
    overviewFile = 'linear_algebra.html';
  } else if (path.includes('Calculus')) {
    sectionKey = 'II';
    overviewFile = 'calculus.html';
  } else if (path.includes('Probability')) {
    sectionKey = 'III';
    overviewFile = 'probability.html';
  } else if (path.includes('Discrete')) {
    sectionKey = 'IV';
    overviewFile = 'discrete_math.html';
  } else if (path.includes('Machine_learning')) {
    sectionKey = 'V';
    overviewFile = 'ml.html';
  }

  if (!sectionKey) {
    // Not in a section page, hide navigation
    document.querySelector('.quick-jump-container').style.display = 'none';
    return;
  }

  // Check if this is a detail page (has level: detail in front matter)
  const isDetailPage = '{{ page.level }}' === 'detail';
  const currentFile = path.split('/').pop();

  function groupTitle(slug, data) {
    const map = (data && data.topicGroupTitles) || {};
    if (map[slug]) return map[slug];
    if (!slug) return 'Other';
    return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  // Load curriculum data
  fetch('/data/curriculum.json')
    .then(response => response.json())
    .then(curriculum => {
      const section = curriculum.sections[sectionKey];
      if (!section) {
        console.error('Section not found:', sectionKey);
        return;
      }

      // Update section title. On detail pages the heading links to the
      // section overview (there is no separate Overview button).
      document.getElementById('nav-section-title').innerHTML =
        'Section ' + sectionKey + ' Navigation';
      const heading = document.getElementById('nav-section-heading');
      if (isDetailPage) {
        heading.innerHTML = '<a href="' + overviewFile + '" class="qj-overview-link"></a>';
        heading.firstChild.textContent = section.title;
      } else {
        heading.textContent = section.title;
      }

      // Atlas link pre-filtered to this section
      document.getElementById('qj-atlas-link').href = '/map/atlas.html#s=' + sectionKey;

      const partHref = part => isDetailPage
        ? part.url
        : '../' + section.baseUrl.split('/')[1] + '/' + part.url;

      // --- Prev / Next (curriculum order; detail pages only) ---
      const idx = section.parts.findIndex(p => p.url === currentFile);

      // --- Hero watermark glyph (design v2): inject the page's icon
      //     from curriculum.json behind the hero title ---
      if (idx !== -1 && section.parts[idx].icon) {
        const heroEl = document.querySelector('.hero-section');
        if (heroEl && !heroEl.querySelector('.hero-mark')) {
          const mark = document.createElement('span');
          mark.className = 'hero-mark';
          mark.setAttribute('aria-hidden', 'true');
          const glyph = section.parts[idx].icon;
          mark.textContent = glyph;
          // Long glyphs (e.g. "P(θ|D)") must not overflow the hero:
          // scale the size down with the glyph length. 1-2 chars keep
          // the CSS ceiling; longer strings shrink proportionally.
          const len = Math.max(Array.from(glyph).length, 1);  // code points, not UTF-16 units
          const scale = Math.min(1, 2.2 / len);
          if (scale < 1) {
            mark.style.setProperty('--mark-scale', scale.toFixed(2));
          }
          heroEl.insertBefore(mark, heroEl.firstChild);
        }
      }
      const pn = document.getElementById('qj-prevnext');
      if (isDetailPage && idx !== -1) {
        const mk = (part, label, cls) => part
          ? '<a class="' + cls + '" href="' + partHref(part) + '" title="' +
            (part.title || '').replace(/"/g, '&quot;') + '">' + label + '</a>'
          : '<span class="' + cls + ' qj-disabled">' + label + '</span>';
        pn.innerHTML =
          mk(section.parts[idx - 1], '&larr; Prev', 'qj-prev') +
          mk(section.parts[idx + 1], 'Next &rarr;', 'qj-next');
      } else {
        pn.style.display = 'none';
      }

      // --- Grouped link list ---
      const container = document.getElementById('nav-links-container');
      const order = [];
      const byGroup = {};
      section.parts.forEach(part => {
        const g = part.topicGroup || 'other';
        if (!byGroup[g]) { byGroup[g] = []; order.push(g); }
        byGroup[g].push(part);
      });

      let html = '';
      order.forEach(g => {
        html += '<div class="qj-group">';
        html += '<div class="qj-group-head">' + groupTitle(g, curriculum) +
                ' <span class="qj-group-n">(' + byGroup[g].length + ')</span></div>';
        byGroup[g].forEach(part => {
          const partNum = (/(\d+)$/.exec(part.id) || [])[1] || '';
          const isCurrent = part.url === currentFile;
          const hay = [part.title, part.id, g, groupTitle(g, curriculum)]
            .concat(part.keywords || []).join(' ').toLowerCase();
          html += '<a href="' + partHref(part) + '"' +
                  (isCurrent ? ' class="current-page"' : '') +
                  ' data-hay="' + hay.replace(/"/g, '&quot;') + '">' +
                  partNum + '. ' + part.title + '</a>';
        });
        html += '</div>';
      });
      container.innerHTML = html;

      // --- "On this page": mirror the page's own .topic-nav anchors ---
      const tocAnchors = Array.from(document.querySelectorAll('.topic-nav a'));
      if (tocAnchors.length) {
        const g = document.createElement('div');
        g.className = 'qj-group qj-onpage';
        const head = document.createElement('div');
        head.className = 'qj-group-head';
        head.textContent = 'On this page';
        g.appendChild(head);
        tocAnchors.forEach(src => {
          const a = document.createElement('a');
          a.href = src.getAttribute('href');
          a.textContent = src.textContent.trim();
          a.setAttribute('data-hay', src.textContent.trim().toLowerCase());
          g.appendChild(a);
        });
        container.insertBefore(g, container.firstChild);
      }

      // In-page anchor picks should close the menu (the page does not
      // reload, so it would otherwise stay open over the content).
      container.addEventListener('click', function (e) {
        const a = e.target.closest('a');
        if (a && (a.getAttribute('href') || '').charAt(0) === '#') {
          document.getElementById('quick-jump-menu').classList.remove('active');
        }
      });

      // --- Filter ---
      const filter = document.getElementById('qj-filter');
      filter.addEventListener('input', function () {
        const q = filter.value.trim().toLowerCase();
        container.querySelectorAll('.qj-group').forEach(group => {
          let shown = 0;
          group.querySelectorAll('a').forEach(a => {
            const hit = !q || a.getAttribute('data-hay').indexOf(q) !== -1;
            a.style.display = hit ? '' : 'none';
            if (hit) shown++;
          });
          group.style.display = shown ? '' : 'none';
        });
      });

      // --- Scroll current page into view when the menu opens ---
      const toggle = document.getElementById('quick-jump-toggle');
      toggle.addEventListener('click', function () {
        const cur = container.querySelector('a.current-page');
        if (cur) {
          requestAnimationFrame(() => {
            cur.scrollIntoView({ block: 'center' });
          });
        }
      });
    })
    .catch(error => {
      console.error('Failed to load curriculum:', error);
      document.querySelector('.quick-jump-container').style.display = 'none';
    });
})();
</script>
